<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16204a">
<title>📸 畢業打卡機 ｜ 石門國小 第103屆畢業典禮</title>
<meta name="description" content="石門國小 第103屆畢業典禮 線上打卡機：開鏡頭即時套上畢業外框、和六位班導師一起拍照，一鍵下載分享。">
<link rel="icon" href="favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --navy-900:#0e1530; --navy-800:#16204a; --navy-700:#233268;
    --gold:#f5c451; --gold-soft:#f8d98a; --ink:#fff;
    --font:"Noto Sans TC",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:var(--font);color:var(--ink);min-height:100vh;min-height:100dvh;
    background:radial-gradient(120% 90% at 50% -10%,#3a4f9e 0%,#233268 42%,#16204a 76%,#0e1530 100%);
    display:flex;flex-direction:column;align-items:center;
    padding:max(10px,env(safe-area-inset-top)) 12px max(14px,env(safe-area-inset-bottom));
  }
  /* 工作區：手機=直向堆疊（取景台在上、面板在下）；桌機/寬螢幕=橫向兩欄（取景台在左、面板在右），善用左右留白 */
  .workspace{flex:1 1 auto;min-height:0;width:100%;display:flex;flex-direction:column;align-items:center;gap:4px;}
  /* 取景台容器：吃掉剩餘高度，置中 stage（stage 尺寸由 JS 精準算，保 9:16 又不溢出） */
  .main{flex:1 1 auto;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;}
  /* 面板：風格縮圖 + 控制鈕 + 提示 */
  .panel{width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;}
  /* 固定左上角「回主頁」按鈕：任何狀態都看得到，家長隨時回得去 */
  .topback{position:fixed;top:max(10px,env(safe-area-inset-top));left:max(10px,env(safe-area-inset-left));z-index:30;
    display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.28);color:#fff;text-decoration:none;font-weight:700;
    font-size:.84rem;padding:8px 14px;border-radius:999px;-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);
    box-shadow:0 4px 14px rgba(0,0,0,.25);transition:transform .12s ease,background .2s ease;}
  .topback:hover{background:rgba(255,255,255,.22);}
  .topback:active{transform:scale(.95);}
  header{text-align:center;margin:4px 0 7px;}
  header .logo{width:48px;height:48px;vertical-align:middle;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4));}
  header h1{display:inline-block;vertical-align:middle;margin-left:8px;font-size:clamp(1.15rem,4.4vw,1.6rem);font-weight:900;letter-spacing:.5px;}
  header .sub{color:#cdd6f4;font-size:clamp(.76rem,3vw,.92rem);margin-top:3px;}

  /* 9:16 取景台（width/height 由 JS fitStage 設定；此為 JS 跑前的後備尺寸） */
  .stage{position:relative;aspect-ratio:9/16;width:min(92vw,420px);
    border-radius:18px;overflow:hidden;background:#0b1024;
    box-shadow:0 18px 50px rgba(0,0,0,.5);border:1px solid rgba(245,196,81,.25);}
  .stage video,.stage canvas#shot,.stage .placeholder{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .stage video.mirror{transform:scaleX(-1);}
  .stage .frame{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .stage .placeholder{display:flex;align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(circle at 50% 38%,#2b3c74,#0b1024);color:#9fb0e0;
    font-size:.95rem;line-height:1.7;padding:24px;}
  #shot{display:none;object-fit:contain;background:#0b1024;}
  .badge{position:absolute;left:10px;top:10px;background:rgba(8,14,34,.6);color:var(--gold-soft);
    font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:999px;border:1px solid rgba(245,196,81,.35);}

  /* 風格選擇 */
  .frames{display:flex;gap:8px;overflow-x:auto;max-width:min(94vw,520px);padding:7px 2px;scrollbar-width:thin;}
  .frames button{flex:0 0 auto;width:46px;height:82px;border-radius:10px;overflow:hidden;
    border:2px solid transparent;background:#0b1024 center/cover no-repeat;cursor:pointer;position:relative;opacity:.72;transition:.15s;}
  .frames button .lbl{position:absolute;left:0;right:0;bottom:0;font-size:.56rem;background:rgba(8,14,34,.7);padding:2px 0;text-align:center;color:#e9eefc;}
  .frames button.active{opacity:1;border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,196,81,.3);}

  .controls{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:6px;flex-wrap:wrap;}
  button.btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:999px;
    transition:transform .12s ease,box-shadow .2s ease;}
  button.btn:active{transform:scale(.95);}
  .shutter{width:74px;height:74px;border-radius:50%;background:linear-gradient(180deg,#ffd06b,#f5b942);
    color:#141d3b;font-size:1.9rem;box-shadow:0 10px 24px rgba(245,185,66,.45);display:grid;place-items:center;}
  .icon-btn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.25);color:#fff;font-size:1.3rem;display:grid;place-items:center;}
  .pill{padding:13px 22px;font-size:1.02rem;display:inline-flex;align-items:center;gap:8px;}
  .pill-go{background:linear-gradient(180deg,#ffd06b,#f5b942);color:#141d3b;box-shadow:0 10px 24px rgba(245,185,66,.4);}
  .pill-alt{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.28);}
  .pill-green{background:linear-gradient(180deg,#34d399,#0f9d58);color:#06281c;box-shadow:0 10px 24px rgba(15,157,88,.4);}
  .hide{display:none !important;}
  .hint{color:#aebbe4;font-size:.78rem;text-align:center;margin-top:6px;line-height:1.6;max-width:90vw;}
  .err{color:#ffd3d3;background:rgba(153,27,27,.35);border:1px solid rgba(248,113,113,.4);
    padding:10px 14px;border-radius:12px;font-size:.85rem;margin-top:10px;max-width:90vw;text-align:center;line-height:1.6;}
  footer{margin-top:auto;padding-top:10px;font-size:.76rem;color:rgba(255,255,255,.5);text-align:center;line-height:1.6;}
  footer a{color:rgba(255,255,255,.72);text-decoration:none;border-bottom:1px dotted currentColor;}
  footer a:hover{color:var(--gold);}
  footer .cred{margin-top:5px;}
  a.back{color:#cdd6f4;font-size:.84rem;text-decoration:none;border-bottom:none;}
  /* 上傳中遮罩 + QR modal */
  .uploading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(8,12,28,.6);color:#fff;font-weight:800;font-size:1rem;border-radius:18px;z-index:4;}
  .spin{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:var(--gold);
    border-radius:50%;display:inline-block;margin-right:9px;animation:spin 1s linear infinite;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(8,12,28,.8);padding:18px;}
  .modal .box{background:linear-gradient(180deg,#1b2750,#141d3b);border:1px solid rgba(245,196,81,.35);
    border-radius:20px;padding:22px 20px;max-width:340px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.55);}
  .modal h2{font-size:1.18rem;margin-bottom:6px;color:var(--gold-soft);}
  .modal p{font-size:.86rem;color:#cdd6f4;line-height:1.7;margin-bottom:14px;}
  .modal .qrwrap{background:#fff;border-radius:14px;padding:12px;display:inline-block;margin-bottom:14px;}
  .modal .qrwrap img{display:block;width:min(62vw,230px);height:min(62vw,230px);}
  .modal .qrOpen{display:inline-block;margin-bottom:12px;}
  .modal .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  /* 矮螢幕「窄」手機：再精簡 chrome，把空間讓給取景台（限窄螢幕，不影響桌機兩欄） */
  @media (max-height:730px) and (max-width:879px){
    header .sub{display:none;}
    header .logo{width:40px;height:40px;}
    .hint{display:none;}
    .frames button{width:42px;height:74px;}
    footer{padding-top:6px;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
  /* ===== 桌機 / 寬螢幕：兩欄（取景台左、面板右），取景台變大、左右留白被善用 ===== */
  @media (min-width:880px){
    .workspace{flex-direction:row;align-items:stretch;justify-content:center;gap:26px;max-width:900px;margin:0 auto;}
    .main{flex:0 0 auto;width:auto;}
    .panel{flex:0 0 296px;width:296px;justify-content:center;gap:14px;}
    .panel .frames{flex-wrap:wrap;justify-content:center;max-width:296px;overflow:visible;padding:2px;}
    .panel .frames button{width:84px;height:150px;}
    .panel .hint{display:block !important;max-width:282px;font-size:.86rem;margin-top:4px;}
    header{margin:8px 0 14px;}
    header .sub{display:block !important;}
    header .logo{width:54px;height:54px;}
    header h1{font-size:1.7rem;}
  }
</style>
</head>
<body>
  <a class="topback" href="./" aria-label="回畢業典禮主頁">← 回主頁</a>
  <header>
    <img class="logo" src="assets/logo.png" alt="石門國小校徽">
    <h1>📸 畢業打卡機</h1>
    <div class="sub">石門國小 第103屆畢業典禮 · 和六位班導師一起入鏡</div>
  </header>

  <div class="workspace" id="workspace">
  <div class="main" id="main">
    <div class="stage" id="stage">
      <div class="placeholder" id="placeholder">📷 按下方「開啟相機」<br>站進框內，和導師們一起拍張畢業照！</div>
      <video id="video" class="mirror" playsinline autoplay muted></video>
      <canvas id="shot"></canvas>
      <img class="frame" id="frame" alt="" src="assets/photobooth/classic.webp?v=1">
      <div class="badge" id="badge">預覽中</div>
      <div class="uploading hide" id="uploading"><span class="spin"></span>上傳中…</div>
    </div>
  </div>
  <div class="panel" id="panel">

  <div class="frames" id="frames" aria-label="選擇外框風格"></div>

  <!-- 拍照前控制 -->
  <div class="controls" id="liveControls">
    <button class="btn icon-btn" id="flipBtn" title="切換前後鏡頭" aria-label="切換鏡頭">🔄</button>
    <button class="btn shutter" id="shutterBtn" title="拍照" aria-label="拍照">📸</button>
    <button class="btn icon-btn" id="uploadBtn" title="改用上傳照片" aria-label="上傳照片">🖼️</button>
  </div>

  <!-- 開場控制 -->
  <div class="controls" id="startControls">
    <button class="btn pill pill-go" id="startBtn">📷 開啟相機</button>
    <button class="btn pill pill-alt" id="uploadBtn2">🖼️ 上傳照片套框</button>
  </div>

  <!-- 拍完控制 -->
  <div class="controls hide" id="resultControls">
    <button class="btn pill pill-green" id="qrBtn">📲 產生 QR 帶走</button>
    <button class="btn pill pill-go" id="downloadBtn">⬇️ 下載</button>
    <button class="btn pill pill-alt" id="shareBtn">🔗 分享</button>
    <button class="btn pill pill-alt" id="retakeBtn">↩️ 重拍</button>
  </div>

  <div class="err hide" id="err"></div>
  <div class="hint" id="hint">小提示：預設用 📷 <b>後鏡頭</b>拍完整合照（畫質更清楚）；想自拍按 <b>🔄</b> 切換前鏡頭。人對準中央框最好看，拍完可下載或分享。</div>
  </div><!-- /panel -->
  </div><!-- /workspace -->

  <input type="file" id="fileInput" accept="image/*" class="hide">

  <!-- 掃 QR 帶走照片 -->
  <div class="modal hide" id="qrModal" role="dialog" aria-modal="true" aria-label="掃描帶走照片">
    <div class="box">
      <h2>📲 掃描帶走照片</h2>
      <p>用手機相機（或掃碼 App）對準下方條碼，<br>即可開啟並儲存這張畢業打卡照。</p>
      <div class="qrwrap"><img id="qrImg" alt="照片 QR 條碼" width="230" height="230"></div>
      <a class="btn pill pill-go qrOpen" id="qrOpen" href="#" target="_blank" rel="noopener noreferrer">🔗 直接開啟照片</a>
      <div class="row"><button class="btn pill pill-alt" id="qrClose">完成</button></div>
    </div>
  </div>

  <footer>
    <a class="back" href="./">← 回畢業典禮網站</a>
    <div class="cred">石門國小 第103屆畢業典禮 · 打卡機 ｜ Made with <span aria-label="愛心">❤️</span> by
    <a href="https://www.smes.tyc.edu.tw/modules/tadnews/page.php?ncsn=11&nsn=16#a5" target="_blank" rel="noopener noreferrer">阿凱老師</a></div>
  </footer>

<script>
(function(){
  "use strict";
  var V = "1";
  var FRAMES = [
    {k:"classic",   n:"粉藍"},
    {k:"sakura",    n:"櫻花"},
    {k:"botanical", n:"花環"},
    {k:"crayon",    n:"蠟筆"},
    {k:"galaxy",    n:"星空"},
  ];
  var OUT_W = 1080, OUT_H = 1920;
  // 現有 GAS 後端（沿用祝福端點）：照片以 text/plain POST（免 CORS preflight），回傳 Drive 連結
  var ENDPOINT = "https://script.google.com/macros/s/AKfycbyQ49Y_tAxh4dBmyK0Rwcb-apR1tShdNpLTPRCKClbyVGQtSX9-atoNDzvCNiucx2NX/exec";

  var $ = function(id){ return document.getElementById(id); };
  var stage=$("stage"), video=$("video"), shot=$("shot"), frameImg=$("frame"), badge=$("badge"),
      framesEl=$("frames"), placeholder=$("placeholder"), errEl=$("err"), fileInput=$("fileInput");
  var startControls=$("startControls"), liveControls=$("liveControls"), resultControls=$("resultControls");

  var stream=null, facing="environment", curFrame="classic", lastDataUrl=null; // 預設後鏡頭：拍完整合照、畫質更清楚
  // 給 canvas 用的、確定載入完成的外框影像
  var frameBitmap = new Image();
  frameBitmap.crossOrigin = "anonymous";

  function frameUrl(k){ return "assets/photobooth/"+k+".webp?v="+V; }
  function showErr(msg){ errEl.textContent = msg; errEl.classList.remove("hide"); }
  function clearErr(){ errEl.classList.add("hide"); }

  // 建立風格縮圖選單
  FRAMES.forEach(function(f){
    var b=document.createElement("button");
    b.style.backgroundImage="url('"+frameUrl(f.k)+"')";
    b.title=f.n; b.dataset.k=f.k;
    if(f.k===curFrame) b.classList.add("active");
    b.innerHTML='<span class="lbl">'+f.n+'</span>';
    b.addEventListener("click", function(){ selectFrame(f.k, b); });
    framesEl.appendChild(b);
  });
  function selectFrame(k, btn){
    curFrame=k;
    frameImg.src=frameUrl(k);
    frameBitmap.src=frameUrl(k);
    [].forEach.call(framesEl.children, function(c){ c.classList.toggle("active", c.dataset.k===k); });
    if(btn){} // active 已切
  }
  frameBitmap.src=frameUrl(curFrame);

  // ---- 相機 ----
  function setMode(mode){ // 'start' | 'live' | 'result'
    startControls.classList.toggle("hide", mode!=="start");
    liveControls.classList.toggle("hide", mode!=="live");
    resultControls.classList.toggle("hide", mode!=="result");
    framesEl.style.display = (mode==="result") ? "none" : "flex";
    placeholder.style.display = (mode==="start") ? "flex" : "none";
    video.style.display = (mode==="live") ? "block" : "none";
    shot.style.display = (mode==="result") ? "block" : "none";
    frameImg.style.display = (mode==="result") ? "none" : "block"; // result 已把框畫進圖
    badge.textContent = mode==="live" ? (facing==="user" ? "🤳 前鏡頭（自拍）" : "📷 後鏡頭")
      : (mode==="result" ? "✓ 拍好了" : "預覽中");
  }

  async function startCamera(){
    clearErr();
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showErr("這個瀏覽器不支援開啟相機，請改用「上傳照片套框」。"); return;
    }
    try{
      if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); }
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode: facing, width:{ideal:1920}, height:{ideal:1920} }, audio:false
      });
      video.srcObject = stream;
      video.classList.toggle("mirror", facing==="user");
      await video.play().catch(function(){});
      setMode("live");
    }catch(e){
      var msg = "無法開啟相機。";
      if(e && (e.name==="NotAllowedError"||e.name==="SecurityError")) msg="相機權限被拒絕。請在瀏覽器網址列允許相機，或改用「上傳照片套框」。";
      else if(e && e.name==="NotFoundError") msg="找不到相機裝置，請改用「上傳照片套框」。";
      showErr(msg);
      setMode("start");
    }
  }

  function stopCamera(){ if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream=null; } }

  // ---- 把影像（video 或 image）以 cover 方式畫進 1080x1920，再疊外框 ----
  function compose(source, sw, sh, mirror){
    var c = document.createElement("canvas"); c.width=OUT_W; c.height=OUT_H;
    var ctx = c.getContext("2d");
    var scale = Math.max(OUT_W/sw, OUT_H/sh);
    var dw=sw*scale, dh=sh*scale, dx=(OUT_W-dw)/2, dy=(OUT_H-dh)/2;
    ctx.save();
    if(mirror){ ctx.translate(OUT_W,0); ctx.scale(-1,1); }
    ctx.drawImage(source, dx, dy, dw, dh);
    ctx.restore();
    if(frameBitmap.complete && frameBitmap.naturalWidth){
      ctx.drawImage(frameBitmap, 0, 0, OUT_W, OUT_H);
    }
    return c;
  }

  function showResult(canvas){
    lastDataUrl = canvas.toDataURL("image/jpeg", 0.92);
    var sctx = shot.getContext("2d");
    shot.width=OUT_W; shot.height=OUT_H;
    sctx.drawImage(canvas,0,0);
    stopCamera();
    setMode("result");
  }

  function capture(){
    if(!video.videoWidth){ showErr("相機還沒準備好，請稍候再拍。"); return; }
    showResult(compose(video, video.videoWidth, video.videoHeight, facing==="user"));
  }

  // ---- 下載 / 分享 ----
  function fname(){ return "石門畢業打卡_"+curFrame+".jpg"; }
  function download(){
    if(!lastDataUrl) return;
    var a=document.createElement("a"); a.href=lastDataUrl; a.download=fname(); document.body.appendChild(a); a.click(); a.remove();
  }
  function dataURLtoFile(durl, name){
    var arr=durl.split(","), mime=arr[0].match(/:(.*?);/)[1], bstr=atob(arr[1]), n=bstr.length, u8=new Uint8Array(n);
    while(n--) u8[n]=bstr.charCodeAt(n);
    return new File([u8], name, {type:mime});
  }
  async function share(){
    if(!lastDataUrl) return;
    try{
      var file=dataURLtoFile(lastDataUrl, fname());
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:"石門畢業打卡", text:"石門國小 第103屆畢業典禮 🎓"});
      }else{ download(); }
    }catch(e){ /* 使用者取消或不支援 → 退回下載 */ }
  }

  // ---- 上傳到雲端 → 產生 QR 給家長掃了帶走（只給本人下載，不公開、不上牆）----
  function uploadAndQR(){
    if(!lastDataUrl) return;
    clearErr();
    var up=$("uploading"); up.classList.remove("hide");
    var btn=$("qrBtn"); btn.disabled=true;
    fetch(ENDPOINT, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"photo", image:lastDataUrl})})
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d && d.ok && d.view){ showQR(d.view); }
        else {
          var e=(d&&d.error)||"";
          showErr(/drive|permission|授權|權限/i.test(e)
            ? "雲端相簿尚未啟用（老師需先在後台授權一次）。可先按「⬇️ 下載」存到本機。"
            : "上傳失敗，請稍後再試，或先按「⬇️ 下載」存到本機。");
        }
      })
      .catch(function(){ showErr("網路不穩、上傳失敗。可先按「⬇️ 下載」存到本機。"); })
      .then(function(){ up.classList.add("hide"); btn.disabled=false; });
  }
  function showQR(viewUrl){
    $("qrImg").src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&data="+encodeURIComponent(viewUrl);
    $("qrOpen").href=viewUrl;
    $("qrModal").classList.remove("hide");
  }

  // ---- 上傳照片套框（無相機備援）----
  function pickFile(){ fileInput.click(); }
  fileInput.addEventListener("change", function(){
    var f=fileInput.files && fileInput.files[0]; if(!f) return;
    clearErr();
    var img=new Image();
    img.onload=function(){ showResult(compose(img, img.naturalWidth, img.naturalHeight, false)); };
    img.onerror=function(){ showErr("這張圖讀取失敗，換一張試試。"); };
    img.src=URL.createObjectURL(f);
  });

  // ---- 綁定 ----
  $("startBtn").addEventListener("click", startCamera);
  $("shutterBtn").addEventListener("click", capture);
  $("flipBtn").addEventListener("click", function(){ facing = (facing==="user"?"environment":"user"); startCamera(); });
  $("uploadBtn").addEventListener("click", pickFile);
  $("uploadBtn2").addEventListener("click", pickFile);
  $("qrBtn").addEventListener("click", uploadAndQR);
  $("qrClose").addEventListener("click", function(){ $("qrModal").classList.add("hide"); });
  $("downloadBtn").addEventListener("click", download);
  $("shareBtn").addEventListener("click", share);
  $("retakeBtn").addEventListener("click", function(){ lastDataUrl=null; if(facing){ startCamera(); } else { setMode("start"); } });

  // 若裝置不支援分享檔案，隱藏分享鈕（避免誤導）
  if(!(navigator.canShare)){ $("shareBtn").classList.add("hide"); }

  // 取景台尺寸：保 9:16 又同時不超過容器寬與高（跨瀏覽器穩，不靠 svh calc）
  var mainEl=$("main"), wsEl=$("workspace");
  function fitStage(){
    var w, h;
    if(window.matchMedia("(min-width:880px)").matches){
      // 桌機兩欄：取景台依「可用高度」放到最大，main 縮成 stage 寬（貼齊右側面板、無內部空隙）
      var availH = (mainEl.clientHeight || wsEl.clientHeight) - 6;
      if(availH<=0) availH = window.innerHeight*0.8;
      h = availH; w = h * 9/16;
      var capW = Math.min(window.innerWidth - 296 - 80, 480);   // 不擠到右側面板
      if(w > capW){ w = capW; h = w * 16/9; }
    } else {
      // 手機/直向：取景台填滿剩餘空間（保 9:16 又不溢出）
      var availW = mainEl.clientWidth * 0.96, availH2 = mainEl.clientHeight - 4;
      if(availW<=0 || availH2<=0) return;
      w = Math.min(availW, availH2 * 9/16); h = w * 16/9;
    }
    stage.style.width = Math.round(w) + "px";
    stage.style.height = Math.round(h) + "px";
  }
  window.addEventListener("resize", fitStage);
  window.addEventListener("orientationchange", function(){ setTimeout(fitStage,200); });
  fitStage();

  setMode("start");
})();
</script>
</body>
</html>
