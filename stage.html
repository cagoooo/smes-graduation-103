  <style>
    :root{
      --navy-900:#0e1530; --navy-800:#16204a; --navy-700:#233268;
      --gold:#f5c451; --gold-soft:#f8d98a; --coral:#ff7a6b; --coral-soft:#ff8a7a;
      --ink:#ffffff;
      --font-sans:"Noto Sans TC",system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;
      --font-serif:"Noto Serif TC","Noto Sans TC",serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:var(--font-sans); color:var(--ink); background:var(--navy-900);
      overflow:hidden; position:relative;
      display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }

    /* ===== 背景層：夜空漸層 + 雙彩虹光弧 + 星點 + 紙花 ===== */
    .sky{position:fixed;inset:0;z-index:-4;
      background:
        radial-gradient(120% 95% at 50% -16%, #3a4f9e 0%, #28396f 30%, #1a2750 60%, #0e1530 100%);}
    /* 星雲微光：幾抹柔和色霧，讓夜空有層次 */
    .nebula{position:fixed;inset:-10%;z-index:-3;pointer-events:none;opacity:.9;
      background:
        radial-gradient(40% 32% at 16% 22%, rgba(138,108,255,.36), transparent 70%),
        radial-gradient(44% 36% at 84% 28%, rgba(74,176,250,.32), transparent 72%),
        radial-gradient(52% 42% at 50% 88%, rgba(58,186,200,.26), transparent 70%),
        radial-gradient(32% 28% at 72% 68%, rgba(255,150,128,.17), transparent 72%),
        radial-gradient(26% 22% at 34% 58%, rgba(125,95,255,.18), transparent 74%);
      filter:blur(28px);animation:drift 26s ease-in-out infinite alternate;}
    @keyframes drift{from{transform:translate3d(-1.5%,-1%,0) scale(1.02);}to{transform:translate3d(2%,1.5%,0) scale(1.06);}}
    /* 地平線微光，讓卡片下方有層次 */
    .glow{position:fixed;left:50%;bottom:-20%;transform:translateX(-50%);
      width:130%;height:62%;z-index:-3;border-radius:50%;
      background:radial-gradient(closest-side, rgba(96,128,235,.32), transparent 72%);
      filter:blur(24px);}
    /* 彩虹光弧：拱得更高、更柔 */
    .rainbow{position:fixed;left:50%;bottom:-52%;transform:translateX(-50%);
      width:184%;aspect-ratio:1/1;max-width:2000px;z-index:-3;border-radius:50%;
      background:radial-gradient(closest-side,
        transparent 60%, rgba(125,95,255,.16) 64%, rgba(69,170,242,.16) 70%,
        rgba(46,204,113,.16) 76%, rgba(255,210,63,.19) 82%, rgba(255,159,67,.16) 88%,
        rgba(255,94,108,.15) 94%, transparent 99%);
      filter:blur(6px);}
    /* 流星 */
    .shooting{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden;}
    .shoot{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;
      box-shadow:0 0 9px 1px rgba(255,255,255,.85);opacity:0;
      animation:shoot var(--sdur,11s) ease-in infinite;animation-delay:var(--sdelay,0s);}
    .shoot::after{content:"";position:absolute;top:50%;right:1px;width:150px;height:2px;
      transform:translateY(-50%);transform-origin:right center;border-radius:2px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.9));}
    @keyframes shoot{
      0%{opacity:0;transform:translate(0,0) rotate(20deg) scale(.7);}
      3%{opacity:1;}
      16%{opacity:1;}
      24%,100%{opacity:0;transform:translate(-380px,138px) rotate(20deg) scale(1);}}
    .stars{position:fixed;inset:0;z-index:-2;pointer-events:none;}
    .star{position:absolute;background:#fff;border-radius:50%;
      box-shadow:0 0 6px rgba(255,255,255,.55);animation:twinkle var(--tw,4s) ease-in-out infinite;}
    @keyframes twinkle{0%,100%{opacity:var(--o0,.25);transform:scale(.8);}50%{opacity:var(--o1,1);transform:scale(1.15);}}
    .confetti{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
    .confetti span{position:absolute;top:-18px;width:10px;height:15px;border-radius:2px;opacity:.85;animation:fall linear infinite;}
    @keyframes fall{to{transform:translateY(112vh) rotate(560deg);}}
    /* 背景導師照（依當前批主要班級淡入，半透明融入星空） */
    .stage-teacher{position:fixed;right:clamp(-50px,1vw,30px);bottom:0;z-index:-1;
      height:min(84vh,780px);width:auto;pointer-events:none;
      opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;
      filter:drop-shadow(0 0 46px rgba(96,128,235,.45));
      -webkit-mask-image:linear-gradient(to top,transparent 0%,#000 15%,#000 100%);
      mask-image:linear-gradient(to top,transparent 0%,#000 15%,#000 100%);}
    .stage-teacher.show{opacity:.4;transform:translateY(0);}
    @media (max-width:680px){.stage-teacher{height:56vh;right:-44px;}.stage-teacher.show{opacity:.24;}}

    /* ===== 頁首 ===== */
    .head{display:flex;align-items:center;gap:clamp(14px,2vw,28px);
      padding:clamp(20px,3.2vh,38px) clamp(26px,4vw,64px) clamp(10px,1.6vh,18px);position:relative;z-index:2;}
    .head__logo{width:clamp(58px,7vw,96px);height:auto;
      filter:drop-shadow(0 6px 18px rgba(0,0,0,.45));}
    .head__titles{flex:1;min-width:0;}
    .head__titles h1{font-family:var(--font-serif);font-weight:900;
      font-size:clamp(1.7rem,3.5vw,3.2rem);line-height:1.12;letter-spacing:.5px;
      background:linear-gradient(96deg,#ffffff 0%,var(--gold-soft) 60%,var(--gold) 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 2px 24px rgba(245,196,81,.18);}
    .head__titles p{color:rgba(255,255,255,.76);font-size:clamp(.86rem,1.4vw,1.18rem);
      margin-top:7px;letter-spacing:1.5px;}
    /* 獎章式計數徽章 */
    .head__count{position:relative;flex-shrink:0;text-align:center;
      background:radial-gradient(120% 130% at 50% -10%, rgba(245,196,81,.26), rgba(245,196,81,.06) 70%);
      border:1px solid rgba(245,196,81,.55);border-radius:18px;
      padding:clamp(10px,1.6vh,16px) clamp(18px,2vw,30px);
      box-shadow:0 12px 34px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.18), 0 0 26px rgba(245,196,81,.12);}
    .head__count::before{content:"";position:absolute;inset:5px;border:1px solid rgba(245,196,81,.32);
      border-radius:13px;pointer-events:none;}
    .head__count-eye{display:block;font-size:clamp(.6rem,.85vw,.74rem);color:var(--gold-soft);
      letter-spacing:3px;opacity:.85;margin-bottom:3px;}
    .head__count b{display:block;font-size:clamp(1.7rem,3.3vw,3rem);font-weight:900;color:var(--gold);line-height:1;
      font-family:var(--font-serif);text-shadow:0 0 20px rgba(245,196,81,.45);}
    .head__count>span:last-child{font-size:clamp(.7rem,1.1vw,.98rem);color:rgba(255,255,255,.82);letter-spacing:2px;}
    /* 標語金線 */
    .slogan{display:flex;align-items:center;gap:13px;margin-top:12px;
      color:var(--gold-soft);font-size:clamp(.72rem,1.05vw,.95rem);font-weight:700;letter-spacing:5px;}
    .slogan__ln{height:1px;width:clamp(28px,4vw,54px);
      background:linear-gradient(90deg,rgba(245,196,81,0),rgba(245,196,81,.85));}

    /* ===== 舞台：祝福大卡輪播 ===== */
    .stage{flex:1;display:grid;gap:clamp(18px,2.1vw,34px);align-content:center;
      grid-template-columns:repeat(3,1fr);overflow:hidden;
      padding:clamp(8px,1.5vh,20px) clamp(26px,4vw,64px) clamp(14px,2vh,26px);
      transition:opacity .7s ease;position:relative;z-index:2;}
    .stage.fading{opacity:0;}
    @media (max-width:1100px){.stage{grid-template-columns:repeat(2,1fr);}}
    @media (max-width:680px){.stage{grid-template-columns:1fr;}}

    /* 卡片外層：負責交錯進場 */
    .wcell{display:flex;min-height:0;max-height:100%;
      animation:rise .7s cubic-bezier(.22,1,.36,1) both;}
    .wcell:nth-child(2){animation-delay:.16s;}
    .wcell:nth-child(3){animation-delay:.32s;}
    @keyframes rise{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:none;}}

    .wcard{position:relative;flex:1;min-width:0;border-radius:24px;
      padding:clamp(24px,2.7vw,44px);
      background:linear-gradient(170deg, rgba(255,255,255,.10), rgba(255,255,255,.045));
      border:1px solid rgba(245,196,81,.26);
      box-shadow:0 26px 60px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      display:flex;flex-direction:column;gap:clamp(12px,1.4vw,18px);min-height:0;max-height:100%;overflow:hidden;
      animation:floaty var(--fdur,7s) ease-in-out infinite;animation-delay:var(--fdelay,0s);}
    /* 卡頂金色細光條 */
    .wcard::before{content:"";position:absolute;top:0;left:clamp(20px,2.4vw,40px);right:clamp(20px,2.4vw,40px);height:2px;
      background:linear-gradient(90deg,transparent,rgba(245,196,81,.7),transparent);}
    @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

    .wcard__to{color:var(--gold);font-weight:900;font-size:clamp(1.08rem,1.75vw,1.55rem);
      display:flex;align-items:center;gap:9px;letter-spacing:.5px;}
    .wcard__to .dot{display:inline-block;font-size:.9em;}
    .wcard__msg{color:#fff;font-size:clamp(1.18rem,2vw,1.92rem);line-height:1.72;font-weight:500;
      min-height:0;overflow-wrap:break-word;word-break:break-word;}
    .stage[data-len="len-m"] .wcard__msg{font-size:clamp(1.06rem,1.7vw,1.58rem);}
    .stage[data-len="len-l"] .wcard__msg{font-size:clamp(.96rem,1.45vw,1.34rem);line-height:1.62;}
    .stage[data-len="len-xl"] .wcard__msg{font-size:clamp(.84rem,1.22vw,1.1rem);line-height:1.56;}

    .wcard__like{margin-top:auto;align-self:flex-start;color:var(--coral-soft);font-weight:900;
      font-size:clamp(.95rem,1.4vw,1.3rem);padding-top:4px;}
    .wlike{margin-top:auto;align-self:flex-start;display:inline-flex;align-items:center;gap:9px;cursor:pointer;
      background:linear-gradient(180deg, rgba(255,122,107,.2), rgba(255,122,107,.1));
      border:1.5px solid rgba(255,138,122,.5);border-radius:999px;
      padding:9px 21px;font-family:inherit;font-weight:900;color:var(--coral-soft);line-height:1;
      font-size:clamp(1rem,1.5vw,1.45rem);transition:transform .15s ease,background .2s,border-color .2s,color .2s;
      -webkit-tap-highlight-color:transparent;}
    .wlike:hover{background:rgba(255,122,107,.28);}
    .wlike:active{transform:scale(1.16);}
    .wlike.is-liked{background:rgba(255,122,107,.34);border-color:#ff7a6b;color:#fff;cursor:default;}
    .wlike__h{font-size:1.15em;line-height:1;transform-origin:center;}
    .wlike.is-liked .wlike__h{animation:heartpop .5s ease;}
    .wlike__n.bump{display:inline-block;animation:numbump .5s ease;}
    @keyframes numbump{0%{transform:scale(1);}40%{transform:scale(1.7);}100%{transform:scale(1);}}
    @keyframes heartpop{0%{transform:scale(1);}30%{transform:scale(1.5);}60%{transform:scale(.85);}100%{transform:scale(1);}}

    .fxlayer{position:fixed;inset:0;z-index:9;pointer-events:none;overflow:hidden;}
    .flyheart{position:fixed;font-size:clamp(1.4rem,2vw,2rem);pointer-events:none;will-change:transform,opacity;
      animation:flyup 1.3s ease-out forwards;}
    @keyframes flyup{
      0%{transform:translate(-50%,-50%) scale(.5);opacity:0;}
      15%{opacity:1;}
      100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.25) rotate(var(--rot));opacity:0;}}

    .empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;
      font-size:clamp(1.2rem,2.4vw,2rem);color:rgba(255,255,255,.7);padding:40px;}

    /* ===== 頁尾 ===== */
    .foot{display:flex;align-items:center;justify-content:space-between;gap:16px;
      padding:clamp(10px,1.6vh,18px) clamp(26px,4vw,64px) clamp(14px,2vh,22px);
      font-size:clamp(.76rem,1.2vw,1rem);color:rgba(255,255,255,.6);position:relative;z-index:2;}
    .foot__live{display:inline-flex;align-items:center;gap:8px;}
    .foot__live::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--coral);
      box-shadow:0 0 0 0 rgba(255,122,107,.6);animation:pulse 1.8s infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,122,107,.55);}70%{box-shadow:0 0 0 13px rgba(255,122,107,0);}100%{box-shadow:0 0 0 0 rgba(255,122,107,0);}}

    .fsbtn{position:fixed;top:14px;right:16px;z-index:5;
      background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.26);
      border-radius:999px;padding:9px 16px;font-size:.9rem;font-weight:700;cursor:pointer;
      font-family:inherit;transition:background .2s;}
    .fsbtn:hover{background:rgba(255,255,255,.26);}
    :fullscreen .fsbtn{display:none;}

    @media (prefers-reduced-motion:reduce){
      .confetti span,.star{animation:none;}
      .confetti span,.shooting{display:none;}
      .nebula{animation:none;}
      .wcard,.wcell{animation:none;}
      .stage{transition:none;}
      .flyheart{display:none;}
      .wlike__n.bump,.wlike.is-liked .wlike__h{animation:none;}
    }
  </style>
</head>
<body>
  <div class="sky"></div>
  <div class="nebula"></div>
  <div class="glow"></div>
  <div class="rainbow"></div>
  <div class="shooting" id="shooting" aria-hidden="true"></div>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <div class="confetti" id="confetti" aria-hidden="true"></div>
  <img class="stage-teacher" id="stageTeacher" alt="" aria-hidden="true" />

  <header class="head">
    <img class="head__logo" src="assets/logo.png" alt="石門國小校徽" />
    <div class="head__titles">
      <h1>第103屆 畢業祝福牆</h1>
      <p>桃園市龍潭區石門國民小學 · 115.6.10 畢業典禮</p>
      <div class="slogan"><span class="slogan__ln"></span>啟程 · 感恩 · 祝福</div>
    </div>
    <div class="head__count"><span class="head__count-eye">累計</span><b id="count">—</b><span>則祝福</span></div>
  </header>

  <main class="stage" id="stage">
    <div class="empty" id="empty">祝福載入中…</div>
  </main>

  <footer class="foot">
    <span class="foot__live" id="status">祝福持續更新中</span>
    <span>💛 來自家長與親友的暖心祝福，陪伴畢業生勇敢啟程</span>
  </footer>

  <button class="fsbtn" id="fsbtn" type="button">⛶ 全螢幕</button>
  <div class="fxlayer" id="fxLayer" aria-hidden="true"></div>

  <script>
    (function () {
      // ⬇️ 與 script.js 相同的 GAS Web App /exec（祝福資料來源）。換端點時兩處都要改。
      var ENDPOINT = "https://script.google.com/macros/s/AKfycbyQ49Y_tAxh4dBmyK0Rwcb-apR1tShdNpLTPRCKClbyVGQtSX9-atoNDzvCNiucx2NX/exec";
      function batchSize() { var w = window.innerWidth; return w <= 680 ? 1 : (w <= 1100 ? 2 : 3); }
      var ROTATE_MS = 9000;
      var RELOAD_MS = 90000;
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      var stage = document.getElementById("stage");
      var countEl = document.getElementById("count");
      var statusEl = document.getElementById("status");
      var wishes = [], batch = 0, rotateTimer = null;

      function maskName(n) {
        n = String(n || "").trim();
        if (n.length <= 2) return n;
        return n.charAt(0) + new Array(n.length - 1).join("○") + n.charAt(n.length - 1);
      }
      function esc(s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      var LIKE_KEY = "smes_liked";
      function likedSet() { try { return JSON.parse(localStorage.getItem(LIKE_KEY) || "[]"); } catch (e) { return []; } }
      function hasLiked(r) { return likedSet().indexOf(r) !== -1; }
      function markLiked(r) { try { var a = likedSet(); if (a.indexOf(r) === -1) { a.push(r); localStorage.setItem(LIKE_KEY, JSON.stringify(a)); } } catch (e) {} }
      function bumpNumber(el) { if (reduce || !el) return; el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump"); }
      function flyHearts(btn) {
        if (reduce) return;
        var rect = btn.getBoundingClientRect();
        var layer = document.getElementById("fxLayer");
        var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
        for (var i = 0; i < 9; i++) {
          var h = document.createElement("span");
          h.className = "flyheart"; h.textContent = "❤️";
          h.style.left = cx + "px"; h.style.top = cy + "px";
          h.style.setProperty("--dx", ((Math.random() * 2 - 1) * 140) + "px");
          h.style.setProperty("--dy", (-(90 + Math.random() * 150)) + "px");
          h.style.setProperty("--rot", ((Math.random() * 120 - 60)) + "deg");
          h.style.animationDelay = (Math.random() * 0.14).toFixed(2) + "s";
          layer.appendChild(h);
          (function (el) { setTimeout(function () { el.remove(); }, 1500); })(h);
        }
      }

      // 投影頁背景：依當前批主要班級淡入該班導師照
      var teacherEl = document.getElementById("stageTeacher");
      var curTeacher = null;
      function setTeacher(cls) {
        if (!teacherEl || cls === curTeacher) return;
        curTeacher = cls;
        if (!cls) { teacherEl.classList.remove("show"); return; }
        teacherEl.classList.remove("show");
        setTimeout(function () {
          teacherEl.src = "assets/teachers/60" + cls + ".webp";
          teacherEl.classList.add("show");
        }, reduce ? 0 : 360);
      }

      function renderBatch() {
        if (!wishes.length) {
          stage.innerHTML = '<div class="empty">祝福即將開始收集，敬請期待 💛</div>';
          return;
        }
        var total = wishes.length;
        var bs = batchSize();
        var start = (batch * bs) % total;
        var slice = [];
        for (var i = 0; i < Math.min(bs, total); i++) slice.push(wishes[(start + i) % total]);
        var maxLen = 0;
        slice.forEach(function (w) { maxLen = Math.max(maxLen, String(w.m || "").length); });
        stage.setAttribute("data-len", maxLen <= 40 ? "len-s" : maxLen <= 90 ? "len-m" : maxLen <= 160 ? "len-l" : "len-xl");
        // 當前批主要班級 → 背景淡入該班導師照
        var cc = {};
        slice.forEach(function (w) { var m = String(w.c || "").match(/六年([1-6])班/); if (m) cc[m[1]] = (cc[m[1]] || 0) + 1; });
        var topC = null, topN = 0;
        for (var ck in cc) if (cc[ck] > topN) { topN = cc[ck]; topC = ck; }
        setTeacher(topC);
        var html = slice.map(function (w, idx) {
          var like;
          if (w.r) {
            var liked = hasLiked(w.r);
            like = '<button type="button" class="wlike' + (liked ? " is-liked" : "") + '" data-row="' + w.r + '"' +
              (liked ? " disabled" : "") + '><span class="wlike__h">❤️</span><span class="wlike__n">' + (w.l || 0) + "</span></button>";
          } else {
            like = (w.l && w.l > 0) ? '<div class="wcard__like">❤️ ' + w.l + "</div>" : "";
          }
          var fdur = (6.2 + (idx % 3) * 0.9).toFixed(1);
          var fdelay = (idx * 0.7).toFixed(1);
          return '<div class="wcell"><div class="wcard" style="--fdur:' + fdur + 's;--fdelay:' + fdelay + 's;">' +
            '<div class="wcard__to"><span class="dot">💛</span>給 ' +
            esc(w.c) + " " + esc(maskName(w.n)) + '</div><div class="wcard__msg">' +
            esc(w.m) + "</div>" + like + "</div></div>";
        }).join("");
        if (reduce) { stage.innerHTML = html; return; }
        stage.classList.add("fading");
        setTimeout(function () { stage.innerHTML = html; stage.classList.remove("fading"); }, 700);
      }

      function startRotate() {
        if (rotateTimer) clearInterval(rotateTimer);
        if (wishes.length <= batchSize()) return;
        rotateTimer = setInterval(function () { batch++; renderBatch(); }, ROTATE_MS);
      }

      function load() {
        fetch(ENDPOINT + "?action=wishes&t=" + Date.now())
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var ws = (d && d.wishes) || [];
            wishes = ws;
            countEl.textContent = ws.length;
            statusEl.textContent = ws.length ? "祝福持續更新中" : "等待第一則祝福";
            batch = 0; renderBatch(); startRotate();
          })
          .catch(function () { /* 靜默，保留上一批畫面 */ });
      }

      // 星點
      (function () {
        var box = document.getElementById("stars");
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 90; i++) {
          var s = document.createElement("span");
          s.className = "star";
          var sz = (1.3 + Math.random() * 2.4).toFixed(1);
          s.style.left = (Math.random() * 100).toFixed(1) + "vw";
          s.style.top = (Math.random() * 72).toFixed(1) + "vh";
          s.style.width = sz + "px"; s.style.height = sz + "px";
          s.style.setProperty("--tw", (2.6 + Math.random() * 3.6).toFixed(1) + "s");
          s.style.setProperty("--o0", (0.12 + Math.random() * 0.25).toFixed(2));
          s.style.setProperty("--o1", (0.6 + Math.random() * 0.4).toFixed(2));
          s.style.animationDelay = (-Math.random() * 5).toFixed(1) + "s";
          frag.appendChild(s);
        }
        box.appendChild(frag);
      })();

      // 流星（偶爾劃過）
      (function () {
        if (reduce) return;
        var box = document.getElementById("shooting");
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 4; i++) {
          var s = document.createElement("span");
          s.className = "shoot";
          s.style.left = (52 + Math.random() * 44).toFixed(1) + "vw";
          s.style.top = (2 + Math.random() * 38).toFixed(1) + "vh";
          s.style.setProperty("--sdur", (9 + Math.random() * 7).toFixed(1) + "s");
          s.style.setProperty("--sdelay", (-Math.random() * 16).toFixed(1) + "s");
          frag.appendChild(s);
        }
        box.appendChild(frag);
      })();

      // 紙花
      (function () {
        if (reduce) return;
        var box = document.getElementById("confetti");
        var colors = ["#ff5e6c", "#ff9f43", "#ffd23f", "#2ecc71", "#45aaf2", "#7d5fff", "#f5c451"];
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 34; i++) {
          var s = document.createElement("span");
          s.style.left = Math.random() * 100 + "vw";
          s.style.background = colors[i % colors.length];
          s.style.animationDuration = (7 + Math.random() * 6) + "s";
          s.style.animationDelay = (-Math.random() * 9) + "s";
          s.style.opacity = (0.5 + Math.random() * 0.45).toFixed(2);
          s.style.transform = "rotate(" + (Math.random() * 360).toFixed(0) + "deg)";
          frag.appendChild(s);
        }
        box.appendChild(frag);
      })();

      stage.addEventListener("click", function (e) {
        var btn = e.target.closest ? e.target.closest(".wlike") : null;
        if (!btn || btn.disabled) return;
        var r = parseInt(btn.getAttribute("data-row"), 10);
        if (!r || hasLiked(r)) return;
        markLiked(r);
        btn.classList.add("is-liked"); btn.disabled = true;
        var nEl = btn.querySelector(".wlike__n");
        var cur = (parseInt(nEl.textContent, 10) || 0) + 1;
        nEl.textContent = cur;
        bumpNumber(nEl); flyHearts(btn);
        for (var i = 0; i < wishes.length; i++) if (wishes[i].r === r) { wishes[i].l = cur; break; }
        fetch(ENDPOINT + "?action=like&row=" + r + "&t=" + Date.now())
          .then(function (res) { return res.json(); })
          .then(function (d) {
            if (d && d.ok && typeof d.likes === "number") {
              nEl.textContent = d.likes;
              for (var j = 0; j < wishes.length; j++) if (wishes[j].r === r) { wishes[j].l = d.likes; break; }
            }
          })
          .catch(function () { /* 樂觀更新已生效，靜默 */ });
      });

      var fsbtn = document.getElementById("fsbtn");
      function goFs() {
        var el = document.documentElement;
        if (document.fullscreenElement) return;
        (el.requestFullscreen || el.webkitRequestFullscreen || function () {}).call(el);
      }
      fsbtn.addEventListener("click", goFs);
      document.body.addEventListener("dblclick", goFs);

      var wakeLock = null;
      async function keepAwake() {
        try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
      }
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "visible") keepAwake();
      });
      keepAwake();

      load();
      setInterval(load, RELOAD_MS);
      var rzTimer = null;
      window.addEventListener("resize", function () { clearTimeout(rzTimer); rzTimer = setTimeout(function () { batch = 0; renderBatch(); startRotate(); }, 250); });
    })();
  </script>
</body>
</html>
