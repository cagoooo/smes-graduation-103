  <style>
    :root{
      --navy-900:#0e1530; --navy-800:#16204a; --navy-700:#233268;
      --gold:#f5c451; --gold-soft:#f8d98a; --coral:#ff7a6b; --coral-soft:#ff8a7a;
      --ink:#ffffff;
      --font-sans:"Noto Sans TC",system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;
      --font-serif:"Noto Serif TC","Noto Sans TC",serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:var(--font-sans); color:var(--ink); background:var(--navy-900);
      overflow:hidden; position:relative;
      display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }

    /* ===== 背景層：夜空漸層 + 雙彩虹光弧 + 星點 + 紙花 ===== */
    .sky{position:fixed;inset:0;z-index:-4;
      background:
        radial-gradient(120% 95% at 50% -16%, #3a4f9e 0%, #28396f 30%, #1a2750 60%, #0e1530 100%);}
    /* 星雲微光：幾抹柔和色霧，讓夜空有層次 */
    .nebula{position:fixed;inset:-10%;z-index:-3;pointer-events:none;opacity:.9;
      background:
        radial-gradient(40% 32% at 16% 22%, rgba(138,108,255,.36), transparent 70%),
        radial-gradient(44% 36% at 84% 28%, rgba(74,176,250,.32), transparent 72%),
        radial-gradient(52% 42% at 50% 88%, rgba(58,186,200,.26), transparent 70%),
        radial-gradient(32% 28% at 72% 68%, rgba(255,150,128,.17), transparent 72%),
        radial-gradient(26% 22% at 34% 58%, rgba(125,95,255,.18), transparent 74%);
      filter:blur(28px);animation:drift 26s ease-in-out infinite alternate;}
    @keyframes drift{from{transform:translate3d(-1.5%,-1%,0) scale(1.02);}to{transform:translate3d(2%,1.5%,0) scale(1.06);}}
    /* 地平線微光，讓卡片下方有層次 */
    .glow{position:fixed;left:50%;bottom:-20%;transform:translateX(-50%);
      width:130%;height:62%;z-index:-3;border-radius:50%;
      background:radial-gradient(closest-side, rgba(96,128,235,.32), transparent 72%);
      filter:blur(24px);}
    /* 彩虹光弧：拱得更高、更柔 */
    .rainbow{position:fixed;left:50%;bottom:-52%;transform:translateX(-50%);
      width:184%;aspect-ratio:1/1;max-width:2000px;z-index:-3;border-radius:50%;
      background:radial-gradient(closest-side,
        transparent 60%, rgba(125,95,255,.16) 64%, rgba(69,170,242,.16) 70%,
        rgba(46,204,113,.16) 76%, rgba(255,210,63,.19) 82%, rgba(255,159,67,.16) 88%,
        rgba(255,94,108,.15) 94%, transparent 99%);
      filter:blur(6px);}
    /* 流星 */
    .shooting{position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden;}
    .shoot{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;
      box-shadow:0 0 9px 1px rgba(255,255,255,.85);opacity:0;
      animation:shoot var(--sdur,11s) ease-in infinite;animation-delay:var(--sdelay,0s);}
    .shoot::after{content:"";position:absolute;top:50%;right:1px;width:150px;height:2px;
      transform:translateY(-50%);transform-origin:right center;border-radius:2px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.9));}
    @keyframes shoot{
      0%{opacity:0;transform:translate(0,0) rotate(20deg) scale(.7);}
      3%{opacity:1;}
      16%{opacity:1;}
      24%,100%{opacity:0;transform:translate(-380px,138px) rotate(20deg) scale(1);}}
    .stars{position:fixed;inset:0;z-index:-2;pointer-events:none;}
    .star{position:absolute;background:#fff;border-radius:50%;
      box-shadow:0 0 6px rgba(255,255,255,.55);animation:twinkle var(--tw,4s) ease-in-out infinite;}
    @keyframes twinkle{0%,100%{opacity:var(--o0,.25);transform:scale(.8);}50%{opacity:var(--o1,1);transform:scale(1.15);}}
    .confetti{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
    .confetti span{position:absolute;top:-18px;width:10px;height:15px;border-radius:2px;opacity:.85;animation:fall linear infinite;}
    @keyframes fall{to{transform:translateY(112vh) rotate(560deg);}}
    /* 背景導師照（依當前批主要班級淡入，半透明融入星空） */
    .stage-teacher{position:fixed;right:clamp(-50px,1vw,30px);bottom:0;z-index:-1;
      height:min(84vh,780px);width:auto;pointer-events:none;
      opacity:0;transform:translateY(24px);transition:opacity .8s ease,transform .8s ease;
      filter:drop-shadow(0 0 46px rgba(96,128,235,.45));
      -webkit-mask-image:linear-gradient(to top,transparent 0%,#000 15%,#000 100%);
      mask-image:linear-gradient(to top,transparent 0%,#000 15%,#000 100%);}
    .stage-teacher.show{opacity:.4;transform:translateY(0);}
    @media (max-width:680px){.stage-teacher{height:56vh;right:-44px;}.stage-teacher.show{opacity:.24;}}
    /* 六班導師合體（其他 / 師長篩選時一次呈現全部六位，全局一致） */
    .stage-teachers{position:fixed;left:0;right:0;bottom:0;z-index:-1;
      display:flex;align-items:flex-end;justify-content:center;
      gap:6px;padding:0 8px;pointer-events:none;
      opacity:0;transition:opacity .8s ease;}
    .stage-teachers.show{opacity:.36;}
    /* 六張平分寬度 + height:auto 純等比（永不壓扁變形）；width 取 min 上限避免超寬螢幕高度過大。
       ⚠️ 不可加 max-height：width 固定時 max-height 截高會把人像壓扁變胖（602 踩雷） */
    .stage-teachers img{width:min(calc((100vw - 46px)/6), 300px);height:auto;
      filter:drop-shadow(0 0 30px rgba(96,128,235,.42));
      -webkit-mask-image:linear-gradient(to top,transparent 0%,#000 14%,#000 100%);
      mask-image:linear-gradient(to top,transparent 0%,#000 14%,#000 100%);}
    @media (max-width:680px){
      .stage-teachers{gap:2px;padding:0 4px;}
      .stage-teachers img{width:calc((100vw - 14px)/6);}
      .stage-teachers.show{opacity:.26;}
    }
    /* 班級篩選 chips */
    .stage-filters{position:relative;z-index:3;display:flex;flex-wrap:wrap;justify-content:center;
      gap:9px;padding:2px clamp(20px,4vw,60px) clamp(8px,1.4vh,16px);}
    .stage-filters[hidden]{display:none;}
    .schip{font-family:inherit;font-size:clamp(.78rem,1.4vw,.96rem);font-weight:700;cursor:pointer;
      white-space:nowrap;padding:7px 16px;border-radius:999px;-webkit-tap-highlight-color:transparent;
      background:rgba(255,255,255,.1);color:rgba(255,255,255,.82);
      border:1px solid rgba(255,255,255,.24);transition:background .2s,color .2s,border-color .2s;}
    .schip:hover{border-color:var(--gold);color:var(--gold);}
    .schip.is-active{background:var(--gold);color:var(--navy-900);border-color:var(--gold);}

    /* ===== 頁首 ===== */
    .head{display:flex;align-items:center;gap:clamp(14px,2vw,28px);
      padding:clamp(20px,3.2vh,38px) clamp(26px,4vw,64px) clamp(10px,1.6vh,18px);position:relative;z-index:2;}
    .head__logo{width:clamp(58px,7vw,96px);height:auto;
      filter:drop-shadow(0 6px 18px rgba(0,0,0,.45));}
    .head__titles{flex:1;min-width:0;}
    .head__titles h1{font-family:var(--font-serif);font-weight:900;
      font-size:clamp(1.7rem,3.5vw,3.2rem);line-height:1.12;letter-spacing:.5px;
      background:linear-gradient(96deg,#ffffff 0%,var(--gold-soft) 60%,var(--gold) 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 2px 24px rgba(245,196,81,.18);}
    .head__titles p{color:rgba(255,255,255,.76);font-size:clamp(.86rem,1.4vw,1.18rem);
      margin-top:7px;letter-spacing:1.5px;}
    /* 獎章式計數徽章 */
    .head__count{position:relative;flex-shrink:0;text-align:center;
      background:radial-gradient(120% 130% at 50% -10%, rgba(245,196,81,.26), rgba(245,196,81,.06) 70%);
      border:1px solid rgba(245,196,81,.55);border-radius:18px;
      padding:clamp(10px,1.6vh,16px) clamp(18px,2vw,30px);
      box-shadow:0 12px 34px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.18), 0 0 26px rgba(245,196,81,.12);}
    .head__count::before{content:"";position:absolute;inset:5px;border:1px solid rgba(245,196,81,.32);
      border-radius:13px;pointer-events:none;}
    .head__count-eye{display:block;font-size:clamp(.6rem,.85vw,.74rem);color:var(--gold-soft);
      letter-spacing:3px;opacity:.85;margin-bottom:3px;}
    .head__count b{display:block;font-size:clamp(1.7rem,3.3vw,3rem);font-weight:900;color:var(--gold);line-height:1;
      font-family:var(--font-serif);text-shadow:0 0 20px rgba(245,196,81,.45);}
    .head__count>span:last-child{font-size:clamp(.7rem,1.1vw,.98rem);color:rgba(255,255,255,.82);letter-spacing:2px;}
    /* 標語金線 */
    .slogan{display:flex;align-items:center;gap:13px;margin-top:12px;
      color:var(--gold-soft);font-size:clamp(.72rem,1.05vw,.95rem);font-weight:700;letter-spacing:5px;}
    .slogan__ln{height:1px;width:clamp(28px,4vw,54px);
      background:linear-gradient(90deg,rgba(245,196,81,0),rgba(245,196,81,.85));}

    /* ===== 舞台：祝福大卡輪播 ===== */
    .stage{flex:1;display:grid;gap:clamp(18px,2.1vw,34px);align-content:center;
      grid-template-columns:repeat(3,1fr);overflow:hidden;
      padding:clamp(8px,1.5vh,20px) clamp(26px,4vw,64px) clamp(14px,2vh,26px);
      transition:opacity .7s ease;position:relative;z-index:2;}
    .stage.fading{opacity:0;}
    @media (max-width:1100px){.stage{grid-template-columns:repeat(2,1fr);}}
    @media (max-width:680px){.stage{grid-template-columns:1fr;}}

    /* 卡片外層：負責交錯進場 */
    .wcell{display:flex;min-height:0;max-height:100%;
      animation:rise .7s cubic-bezier(.22,1,.36,1) both;}
    .wcell:nth-child(2){animation-delay:.16s;}
    .wcell:nth-child(3){animation-delay:.32s;}
    @keyframes rise{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:none;}}

    .wcard{position:relative;flex:1;min-width:0;border-radius:24px;
      padding:clamp(24px,2.7vw,44px);
      background:linear-gradient(170deg, rgba(255,255,255,.10), rgba(255,255,255,.045));
      border:1px solid rgba(245,196,81,.26);
      box-shadow:0 26px 60px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      display:flex;flex-direction:column;gap:clamp(12px,1.4vw,18px);min-height:0;max-height:100%;overflow:hidden;
      animation:floaty var(--fdur,7s) ease-in-out infinite;animation-delay:var(--fdelay,0s);}
    /* 溢出捲動提示：右下角浮現可上下捲動的小箭頭（捲到底自動消失） */
    .scrollcue{position:absolute;right:13px;bottom:12px;z-index:2;width:32px;height:32px;border-radius:50%;
      display:none;align-items:center;justify-content:center;pointer-events:none;
      background:rgba(16,23,51,.62);border:1px solid rgba(245,196,81,.6);color:var(--gold);
      font-size:1.15rem;line-height:1;box-shadow:0 3px 12px rgba(0,0,0,.4);
      animation:cuebounce 1.4s ease-in-out infinite;}
    .wcard.can-scroll:not(.at-bottom) .scrollcue{display:flex;}
    @keyframes cuebounce{0%,100%{transform:translateY(0);}50%{transform:translateY(4px);}}
    /* 卡頂金色細光條 */
    .wcard::before{content:"";position:absolute;top:0;left:clamp(20px,2.4vw,40px);right:clamp(20px,2.4vw,40px);height:2px;
      background:linear-gradient(90deg,transparent,rgba(245,196,81,.7),transparent);}
    @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

    .wcard__to{color:var(--gold);font-weight:900;font-size:clamp(1.08rem,1.75vw,1.55rem);
      display:flex;align-items:center;gap:9px;letter-spacing:.5px;}
    .wcard__to .dot{display:inline-block;font-size:.9em;}
    .wcard__msg{color:#fff;font-size:clamp(1.18rem,2vw,1.92rem);line-height:1.72;font-weight:500;
      flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;
      overflow-wrap:break-word;word-break:break-word;padding-right:6px;
      scrollbar-width:thin;scrollbar-color:rgba(245,196,81,.55) transparent;}
    .wcard__msg::-webkit-scrollbar{width:7px;}
    .wcard__msg::-webkit-scrollbar-thumb{background:rgba(245,196,81,.5);border-radius:999px;}
    .wcard__msg::-webkit-scrollbar-track{background:rgba(255,255,255,.06);border-radius:999px;}
    /* 文字塞不下時，底部柔和漸隱暗示「下面還有」；捲到底（.at-bottom）就移除遮罩讓最後一行完整呈現 */
    .wcard.can-scroll .wcard__msg{-webkit-mask-image:linear-gradient(to bottom,#000 calc(100% - 40px),transparent);
      mask-image:linear-gradient(to bottom,#000 calc(100% - 40px),transparent);}
    .wcard.can-scroll.at-bottom .wcard__msg{-webkit-mask-image:none;mask-image:none;}
    .wcard.can-scroll{animation:none;}   /* 長祝福捲動時停止漂浮，閱讀更穩 */
    .stage[data-len="len-m"] .wcard__msg{font-size:clamp(1.06rem,1.7vw,1.58rem);}
    .stage[data-len="len-l"] .wcard__msg{font-size:clamp(.96rem,1.45vw,1.34rem);line-height:1.62;}
    .stage[data-len="len-xl"] .wcard__msg{font-size:clamp(.84rem,1.22vw,1.1rem);line-height:1.56;}

    .wcard__like{margin-top:auto;align-self:flex-start;color:var(--coral-soft);font-weight:900;
      font-size:clamp(.95rem,1.4vw,1.3rem);padding-top:4px;}
    .wlike{margin-top:auto;align-self:flex-start;display:inline-flex;align-items:center;gap:9px;cursor:pointer;
      background:linear-gradient(180deg, rgba(255,122,107,.2), rgba(255,122,107,.1));
      border:1.5px solid rgba(255,138,122,.5);border-radius:999px;
      padding:9px 21px;font-family:inherit;font-weight:900;color:var(--coral-soft);line-height:1;
      font-size:clamp(1rem,1.5vw,1.45rem);transition:transform .15s ease,background .2s,border-color .2s,color .2s;
      -webkit-tap-highlight-color:transparent;}
    .wlike:hover{background:rgba(255,122,107,.28);}
    .wlike:active{transform:scale(1.16);}
    .wlike.is-liked{background:rgba(255,122,107,.34);border-color:#ff7a6b;color:#fff;cursor:default;}
    .wlike__h{font-size:1.15em;line-height:1;transform-origin:center;}
    .wlike.is-liked .wlike__h{animation:heartpop .5s ease;}
    .wlike__n.bump{display:inline-block;animation:numbump .5s ease;}
    @keyframes numbump{0%{transform:scale(1);}40%{transform:scale(1.7);}100%{transform:scale(1);}}
    @keyframes heartpop{0%{transform:scale(1);}30%{transform:scale(1.5);}60%{transform:scale(.85);}100%{transform:scale(1);}}

    .fxlayer{position:fixed;inset:0;z-index:9;pointer-events:none;overflow:hidden;}
    .flyheart{position:fixed;font-size:clamp(1.4rem,2vw,2rem);pointer-events:none;will-change:transform,opacity;
      animation:flyup 1.3s ease-out forwards;}
    @keyframes flyup{
      0%{transform:translate(-50%,-50%) scale(.5);opacity:0;}
      15%{opacity:1;}
      100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.25) rotate(var(--rot));opacity:0;}}

    .empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;
      font-size:clamp(1.2rem,2.4vw,2rem);color:rgba(255,255,255,.7);padding:40px;}

    /* 新祝福即時通知 toast（背景輪詢偵測到審核通過的新祝福時，金色 pill 自底部淡入；投影牆同時把最新祝福捲到最前） */
    .newwish-toast{position:fixed;left:50%;bottom:64px;transform:translateX(-50%) translateY(22px);
      z-index:30;display:inline-flex;align-items:center;gap:11px;
      font-family:inherit;font-size:clamp(1rem,2.1vw,1.4rem);font-weight:800;white-space:nowrap;
      padding:15px 30px;border-radius:999px;border:1.6px solid var(--gold);
      background:linear-gradient(120deg,var(--navy-800),var(--navy-700));color:#fff;
      box-shadow:0 16px 44px rgba(16,23,51,.55), 0 0 32px rgba(245,196,81,.22);
      opacity:0;pointer-events:none;
      transition:opacity .4s ease, transform .45s cubic-bezier(.22,1,.36,1);}
    .newwish-toast[hidden]{display:none;}
    .newwish-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .newwish-toast__ico{font-size:1.3em;}
    .newwish-toast__n{color:var(--gold);font-size:1.2em;margin:0 3px;font-family:var(--font-serif);font-weight:900;}
    @media (max-width:680px){
      .newwish-toast{bottom:148px;padding:12px 22px;white-space:normal;max-width:88vw;text-align:center;}
    }

    /* ===== 頁尾 ===== */
    .foot{display:flex;align-items:center;justify-content:space-between;gap:16px;
      padding:clamp(10px,1.6vh,18px) clamp(26px,4vw,64px) clamp(14px,2vh,22px);
      font-size:clamp(.76rem,1.2vw,1rem);color:rgba(255,255,255,.6);position:relative;z-index:2;}
    .foot__live{display:inline-flex;align-items:center;gap:8px;}
    .foot__live::before{content:"";width:10px;height:10px;border-radius:50%;background:var(--coral);
      box-shadow:0 0 0 0 rgba(255,122,107,.6);animation:pulse 1.8s infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,122,107,.55);}70%{box-shadow:0 0 0 13px rgba(255,122,107,0);}100%{box-shadow:0 0 0 0 rgba(255,122,107,0);}}

    .stage-ctrl{position:fixed;top:14px;right:16px;z-index:5;display:flex;gap:8px;}
    .fsbtn{
      background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.26);
      border-radius:999px;padding:9px 16px;font-size:.9rem;font-weight:700;cursor:pointer;
      font-family:inherit;transition:background .2s,border-color .2s,color .2s;}
    .fsbtn:hover{background:rgba(255,255,255,.26);}
    .fsbtn.is-playing{background:rgba(245,196,81,.28);border-color:rgba(245,196,81,.6);color:var(--gold-soft);}
    :fullscreen .stage-ctrl{display:none;}
    .homebtn{position:fixed;top:14px;left:16px;z-index:5;text-decoration:none;
      background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.26);
      border-radius:999px;padding:9px 16px;font-size:.9rem;font-weight:700;
      font-family:inherit;transition:background .2s;}
    .homebtn:hover{background:rgba(255,255,255,.26);}
    :fullscreen .homebtn{display:none;}
    /* 手機端：頂部控制鈕縮小靠邊、header 內容整體下移，避免與回主頁/全螢幕鈕重疊 */
    @media (max-width:680px){
      .homebtn{top:10px;left:10px;padding:6px 11px;font-size:.78rem;}
      .stage-ctrl{top:10px;right:10px;gap:6px;}
      .stage-ctrl .fsbtn{padding:6px 10px;font-size:.78rem;}
      .head{padding-top:56px;}
    }
    /* 掃碼留祝福卡片（可關閉收合、可點擊放大；現場家長手機掃描 → 開啟祝福表單） */
    .qrwish{position:fixed;left:18px;bottom:58px;z-index:4;
      display:flex;align-items:center;gap:11px;
      background:rgba(255,255,255,.95);border-radius:16px;padding:11px 15px 11px 11px;
      box-shadow:0 12px 34px rgba(0,0,0,.45);border:1px solid rgba(245,196,81,.55);}
    .qrwish[hidden]{display:none;}
    .qrwish__zoom{padding:0;border:0;background:none;cursor:zoom-in;line-height:0;transition:transform .2s ease;}
    .qrwish__zoom:hover{transform:scale(1.04);}
    .qrwish__zoom img{width:92px;height:92px;display:block;border-radius:7px;}
    .qrwish__txt{color:#16204a;font-weight:900;font-size:1.02rem;line-height:1.35;letter-spacing:.5px;}
    .qrwish__close{position:absolute;top:-9px;right:-9px;width:26px;height:26px;border-radius:50%;
      border:0;cursor:pointer;background:#16204a;color:#fff;font-size:1.05rem;line-height:1;
      display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.4);}
    .qrwish__close:hover{background:#2a3a6e;}
    /* 收合後的迷你浮鈕 */
    .qrmini{position:fixed;left:14px;bottom:52px;z-index:4;width:52px;height:52px;border-radius:50%;
      border:1px solid rgba(245,196,81,.55);cursor:pointer;font-size:1.5rem;
      background:rgba(255,255,255,.95);box-shadow:0 8px 24px rgba(0,0,0,.4);
      display:flex;align-items:center;justify-content:center;transition:transform .2s ease;}
    .qrmini[hidden]{display:none;}
    .qrmini:hover{transform:translateY(-2px);}
    /* 放大 QR overlay：overflow-y:auto + box margin:auto → 放得下置中、放不下可上下自由捲動不裁切 */
    .qrmodal{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
      overflow-y:auto;-webkit-overflow-scrolling:touch;
      background:rgba(8,12,28,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:24px;}
    .qrmodal[hidden]{display:none;}
    .qrmodal__box{position:relative;margin:auto;background:#fff;border-radius:22px;padding:clamp(22px,4vw,34px);
      display:flex;flex-direction:column;align-items:center;gap:16px;
      box-shadow:0 30px 70px rgba(0,0,0,.6);max-width:92vw;}
    /* QR 寬度同時受視窗寬與高限制：矮視窗自動縮小先盡量塞進畫面，仍塞不下才靠捲動 */
    .qrmodal__box img{width:min(64vw,360px,56vh);height:auto;display:block;border-radius:10px;}
    .qrmodal__title{color:#16204a;font-weight:900;font-size:clamp(1.1rem,4vw,1.5rem);text-align:center;}
    .qrmodal__link{color:#fff;background:linear-gradient(120deg,#2e2a6b,#1b2768);text-decoration:none;
      font-weight:800;font-size:clamp(.95rem,3.2vw,1.1rem);padding:11px 24px;border-radius:999px;
      border:1px solid rgba(245,196,81,.5);}
    .qrmodal__link:hover{background:linear-gradient(120deg,#3d3890,#273594);}
    .qrmodal__close{position:absolute;top:-14px;right:-14px;width:40px;height:40px;border-radius:50%;
      border:0;cursor:pointer;background:#16204a;color:#fff;font-size:1.6rem;line-height:1;
      display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.5);}
    .qrmodal__close:hover{background:#2a3a6e;}
    @media (max-width:680px){
      .qrwish{left:10px;bottom:46px;gap:8px;padding:8px 12px 8px 8px;border-radius:13px;}
      .qrwish__zoom img{width:62px;height:62px;}
      .qrwish__txt{font-size:.8rem;}
      .qrmini{left:10px;bottom:42px;width:46px;height:46px;font-size:1.3rem;}
      .qrmodal__box img{width:min(74vw,64vh);}
    }

    @media (prefers-reduced-motion:reduce){
      .confetti span,.star{animation:none;}
      .confetti span,.shooting{display:none;}
      .nebula{animation:none;}
      .wcard,.wcell{animation:none;}
      .stage{transition:none;}
      .flyheart{display:none;}
      .wlike__n.bump,.wlike.is-liked .wlike__h{animation:none;}
      .newwish-toast{transition:none;transform:translateX(-50%) translateY(0);}
      .scrollcue{animation:none;}
    }
  </style>
</head>
<body>
  <div class="sky"></div>
  <div class="nebula"></div>
  <div class="glow"></div>
  <div class="rainbow"></div>
  <div class="shooting" id="shooting" aria-hidden="true"></div>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <div class="confetti" id="confetti" aria-hidden="true"></div>
  <img class="stage-teacher" id="stageTeacher" alt="" aria-hidden="true" />
  <div class="stage-teachers" id="stageTeachersAll" aria-hidden="true">
    <img src="assets/teachers/601.webp" alt="" /><img src="assets/teachers/602.webp" alt="" /><img src="assets/teachers/603.webp" alt="" /><img src="assets/teachers/604.webp" alt="" /><img src="assets/teachers/605.webp" alt="" /><img src="assets/teachers/606.webp" alt="" />
  </div>

  <header class="head">
    <img class="head__logo" src="assets/logo.png" alt="石門國小校徽" />
    <div class="head__titles">
      <h1>第103屆 畢業祝福牆</h1>
      <p>桃園市龍潭區石門國民小學 · 115.6.10 畢業典禮</p>
      <div class="slogan"><span class="slogan__ln"></span>啟程 · 感恩 · 祝福</div>
    </div>
    <div class="head__count"><span class="head__count-eye">累計</span><b id="count">—</b><span>則祝福</span></div>
  </header>

  <div class="stage-filters" id="stageFilters" hidden aria-label="依班級篩選祝福"></div>

  <main class="stage" id="stage">
    <div class="empty" id="empty">祝福載入中…</div>
  </main>

  <footer class="foot">
    <span class="foot__live" id="status">祝福持續更新中</span>
    <span>💛 來自家長與親友的暖心祝福，陪伴畢業生勇敢啟程</span>
  </footer>

  <a class="homebtn" href="index.html#rsvp">← 回主頁</a>
  <div class="stage-ctrl">
    <button class="fsbtn" id="bgmBtn" type="button" aria-label="畢業歌〈風箏〉開關">🔇 畢業歌</button>
    <button class="fsbtn" id="fsbtn" type="button">⛶ 全螢幕</button>
  </div>
  <audio id="bgm" loop preload="none" src="assets/bgm-kite.mp3"></audio>

  <!-- 掃碼留祝福：現場家長手機掃描即可開啟祝福表單（可關閉、點 QR 放大） -->
  <div class="qrwish" id="qrWish">
    <button class="qrwish__zoom" id="qrZoom" type="button" aria-label="放大 QR Code 方便掃描">
      <img src="assets/qr-wish.png" alt="留祝福 QR Code" width="92" height="92" decoding="async" />
    </button>
    <span class="qrwish__txt">📱 掃我<br>留下祝福</span>
    <button class="qrwish__close" id="qrClose" type="button" aria-label="關閉 QR">×</button>
  </div>
  <button class="qrmini" id="qrMini" type="button" hidden aria-label="顯示留祝福 QR Code">📱</button>
  <div class="qrmodal" id="qrModal" hidden role="dialog" aria-modal="true" aria-label="掃碼留下祝福">
    <div class="qrmodal__box">
      <button class="qrmodal__close" id="qrModalClose" type="button" aria-label="關閉">×</button>
      <img src="assets/qr-wish.png" alt="留祝福 QR Code（放大）" />
      <p class="qrmodal__title">📱 掃描 QR Code 留下祝福</p>
      <a class="qrmodal__link" href="index.html#wishform">✍️ 或點此直接留祝福</a>
    </div>
  </div>

  <!-- 新祝福即時通知：背景輪詢偵測到審核通過的新祝福時，金色 toast 自底部淡入（投影牆同時把最新祝福捲到最前） -->
  <div class="newwish-toast" id="newWishToast" hidden role="status" aria-live="polite">
    <span class="newwish-toast__ico" aria-hidden="true">💛</span>
    <span>剛收到 <b class="newwish-toast__n">1</b> 則新祝福！</span>
  </div>

  <div class="fxlayer" id="fxLayer" aria-hidden="true"></div>

  <script>
    (function () {
      // ⬇️ 與 script.js 相同的 GAS Web App /exec（祝福資料來源）。換端點時兩處都要改。
      var ENDPOINT = "https://script.google.com/macros/s/AKfycbyQ49Y_tAxh4dBmyK0Rwcb-apR1tShdNpLTPRCKClbyVGQtSX9-atoNDzvCNiucx2NX/exec";
      function batchSize() { var w = window.innerWidth; return w <= 680 ? 1 : (w <= 1100 ? 2 : 3); }
      var ROTATE_MS = 9000;            // 短祝福（不溢出）每批停留秒數
      var AUTOSCROLL_PX_PER_S = 34;    // 長祝福自動往下捲的速度（投影可舒適閱讀）
      var READ_PAD_MS = 2400;          // 自動捲動前後各停一下，讓人讀頭尾
      var DWELL_CAP_MS = 22000;        // 單批最長停留上限，避免超長祝福卡死輪播
      var MANUAL_IDLE_MS = 8000;       // 使用者手動捲動後，閒置多久恢復自動輪播
      var RELOAD_MS = 25000;   // 25 秒背景輪詢，準即時偵測審核通過的新祝福（無新祝福時靜默更新、不打斷輪播）
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      var stage = document.getElementById("stage");
      var countEl = document.getElementById("count");
      var statusEl = document.getElementById("status");
      var wishes = [], batch = 0, rotateTimer = null, stageFilter = "全部", lastSeenMaxR = null;
      var rafId = null, idleTimer = null, manualScroll = false;   // 自動捲動 / 手動捲動暫停狀態

      function maskName(n, c) { // 與主頁 / 跑馬燈同步：只有「六年X班」畢業生才去識別化，師長 / 其他完整顯示
        n = String(n || "").trim();
        if (String(c || "").indexOf("班") === -1) return n;
        if (n.length <= 1) return n;
        if (n.length === 2) return n.charAt(0) + "○";
        return n.charAt(0) + new Array(n.length - 1).join("○") + n.charAt(n.length - 1);
      }
      function classMatch(w, f) {
        var c = String(w.c || "");
        if (f === "師長") return c.indexOf("師長") !== -1 || c.indexOf("老師") !== -1;
        return c === f;
      }
      function getFiltered() {
        var list = stageFilter === "全部" ? wishes.slice() : wishes.filter(function (w) { return classMatch(w, stageFilter); });
        return list.sort(function (a, b) { return (b.r || 0) - (a.r || 0); }); // 越新（列號越大）的祝福越前面，新祝福更快輪播到
      }
      function esc(s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      var LIKE_KEY = "smes_liked";
      function likedSet() { try { return JSON.parse(localStorage.getItem(LIKE_KEY) || "[]"); } catch (e) { return []; } }
      function hasLiked(r) { return likedSet().indexOf(r) !== -1; }
      function markLiked(r) { try { var a = likedSet(); if (a.indexOf(r) === -1) { a.push(r); localStorage.setItem(LIKE_KEY, JSON.stringify(a)); } } catch (e) {} }
      function bumpNumber(el) { if (reduce || !el) return; el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump"); }
      function flyHearts(btn) {
        if (reduce) return;
        var rect = btn.getBoundingClientRect();
        var layer = document.getElementById("fxLayer");
        var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
        for (var i = 0; i < 9; i++) {
          var h = document.createElement("span");
          h.className = "flyheart"; h.textContent = "❤️";
          h.style.left = cx + "px"; h.style.top = cy + "px";
          h.style.setProperty("--dx", ((Math.random() * 2 - 1) * 140) + "px");
          h.style.setProperty("--dy", (-(90 + Math.random() * 150)) + "px");
          h.style.setProperty("--rot", ((Math.random() * 120 - 60)) + "deg");
          h.style.animationDelay = (Math.random() * 0.14).toFixed(2) + "s";
          layer.appendChild(h);
          (function (el) { setTimeout(function () { el.remove(); }, 1500); })(h);
        }
      }

      // 投影頁背景：依當前批主要班級淡入該班導師照
      var teacherEl = document.getElementById("stageTeacher");
      var curTeacher = null;
      var teacherTimer = null;
      function setTeacher(cls) {
        if (cls === curTeacher) return;
        curTeacher = cls;
        if (teacherTimer) { clearTimeout(teacherTimer); teacherTimer = null; } // 清掉上一次的淡入排程，避免競態又把單張喚回
        if (!teacherEl) return;
        teacherEl.classList.remove("show");
        if (!cls) return; // null → 確保單張隱藏（其他 / 師長改用六班合體）
        teacherTimer = setTimeout(function () {
          teacherEl.src = "assets/teachers/60" + cls + ".webp";
          teacherEl.classList.add("show");
        }, reduce ? 0 : 360);
      }

      // 六班合體背景（其他 / 師長篩選時整排呈現）
      var teachersAllEl = document.getElementById("stageTeachersAll");
      var curAll = false;
      function setTeachersAll(show) {
        if (!teachersAllEl || show === curAll) return;
        curAll = show;
        teachersAllEl.classList.toggle("show", show);
      }

      // 依目前篩選決定背景導師：單班→該班；其他/師長→六班合體；全部→看本批主要對象
      function updateBg(slice) {
        if (stageFilter === "師長" || stageFilter === "其他") { setTeacher(null); setTeachersAll(true); return; }
        var fm = String(stageFilter).match(/六年([1-6])班/);
        if (fm) { setTeachersAll(false); setTeacher(fm[1]); return; }
        // 「全部」：統計本批對象。給師長的卡片不少於最多的單一班級時 →
        // 全六位導師合體背景一起入鏡（給師長的祝福更有帶入感，修正過去師長祝福時背景空白的問題）。
        var cc = {}, teacherN = 0;
        slice.forEach(function (w) {
          var m = String(w.c || "").match(/六年([1-6])班/);
          if (m) { cc[m[1]] = (cc[m[1]] || 0) + 1; }
          else if (classMatch(w, "師長")) { teacherN++; }
        });
        var topC = null, topN = 0;
        for (var ck in cc) if (cc[ck] > topN) { topN = cc[ck]; topC = ck; }
        if (teacherN > 0 && teacherN >= topN) { setTeacher(null); setTeachersAll(true); return; }
        setTeachersAll(false);
        setTeacher(topC);
      }

      // 班級篩選 chips（依實際出現的對象動態建立）
      var filtersEl = document.getElementById("stageFilters");
      function buildStageFilters() {
        if (!filtersEl) return;
        var classes = [];
        wishes.forEach(function (w) { var c = String(w.c || "").trim(); if (c && classes.indexOf(c) === -1) classes.push(c); });
        if (classes.length <= 1) { filtersEl.hidden = true; filtersEl.innerHTML = ""; return; }
        classes.sort();
        filtersEl.innerHTML = ["全部"].concat(classes).map(function (c) {
          return '<button type="button" class="schip' + (c === stageFilter ? " is-active" : "") + '" data-c="' + esc(c) + '">' + esc(c) + "</button>";
        }).join("");
        filtersEl.hidden = false;
      }
      if (filtersEl) filtersEl.addEventListener("click", function (e) {
        var b = e.target;
        if (!b.classList || !b.classList.contains("schip")) return;
        stageFilter = b.getAttribute("data-c") || "全部";
        var bs = filtersEl.querySelectorAll(".schip");
        for (var i = 0; i < bs.length; i++) bs[i].classList.toggle("is-active", bs[i] === b);
        batch = 0; renderBatch();
      });

      function renderBatch() {
        var list = getFiltered();
        if (!list.length) {
          stage.innerHTML = '<div class="empty">這個分類目前還沒有祝福 💛</div>';
          setTeacher(null); setTeachersAll(false);
          return;
        }
        var total = list.length;
        var bs = batchSize();
        var start = (batch * bs) % total;
        var slice = [];
        for (var i = 0; i < Math.min(bs, total); i++) slice.push(list[(start + i) % total]);
        var maxLen = 0;
        slice.forEach(function (w) { maxLen = Math.max(maxLen, String(w.m || "").length); });
        stage.setAttribute("data-len", maxLen <= 40 ? "len-s" : maxLen <= 90 ? "len-m" : maxLen <= 160 ? "len-l" : "len-xl");
        updateBg(slice);
        var html = slice.map(function (w, idx) {
          var like;
          if (w.r) {
            var liked = hasLiked(w.r);
            like = '<button type="button" class="wlike' + (liked ? " is-liked" : "") + '" data-row="' + w.r + '"' +
              (liked ? " disabled" : "") + '><span class="wlike__h">❤️</span><span class="wlike__n">' + (w.l || 0) + "</span></button>";
          } else {
            like = (w.l && w.l > 0) ? '<div class="wcard__like">❤️ ' + w.l + "</div>" : "";
          }
          var fdur = (6.2 + (idx % 3) * 0.9).toFixed(1);
          var fdelay = (idx * 0.7).toFixed(1);
          return '<div class="wcell"><div class="wcard" style="--fdur:' + fdur + 's;--fdelay:' + fdelay + 's;">' +
            '<div class="wcard__to"><span class="dot">💛</span>給 ' +
            esc(w.c) + " " + esc(maskName(w.n, w.c)) + '</div><div class="wcard__msg">' +
            esc(w.m) + "</div>" + like + '<span class="scrollcue" aria-hidden="true">⌄</span></div></div>';
        }).join("");
        if (reduce) { stage.innerHTML = html; afterRender(); return; }
        stage.classList.add("fading");
        setTimeout(function () { stage.innerHTML = html; stage.classList.remove("fading"); afterRender(); }, 700);
      }

      // 內容就位後：標記溢出卡片、啟動自動捲動、依最長卡片決定本批停留時間並排下一批
      function afterRender() {
        clearAutoScroll();
        manualScroll = false;
        clearTimeout(idleTimer);
        var cards = [].slice.call(stage.querySelectorAll(".wcard"));
        cards.forEach(function (card) {
          var m = card.querySelector(".wcard__msg");
          if (!m) return;
          m.scrollTop = 0;
          var canScroll = (m.scrollHeight - m.clientHeight > 4);   // 文字塞不下 = 可捲動
          card.classList.toggle("can-scroll", canScroll);
          card.classList.toggle("at-bottom", !canScroll);          // 不溢出視同已到底（不顯示遮罩/箭頭）
        });
        var dwell = computeDwell(cards);
        if (!reduce) runAutoScroll(cards, dwell);
        scheduleNext(dwell);
      }
      // 依本批最長溢出量決定停留：要夠時間讓最長那張自動捲到底（前後各留 READ_PAD 讓人讀頭尾）
      function computeDwell(cards) {
        if (reduce) return ROTATE_MS;
        var maxOv = 0;
        cards.forEach(function (card) {
          var m = card.querySelector(".wcard__msg");
          if (m) maxOv = Math.max(maxOv, m.scrollHeight - m.clientHeight);
        });
        if (maxOv <= 4) return ROTATE_MS;
        return Math.min(DWELL_CAP_MS, Math.max(ROTATE_MS, READ_PAD_MS * 2 + (maxOv / AUTOSCROLL_PX_PER_S) * 1000));
      }
      // 同步把所有溢出卡片以等速往下捲（手動接手即停）
      function runAutoScroll(cards, dwell) {
        var msgs = cards.map(function (c) { return c.querySelector(".wcard__msg"); })
          .filter(function (m) { return m && (m.scrollHeight - m.clientHeight > 4); });
        if (!msgs.length) return;
        var startTs = null;
        function frame(ts) {
          if (manualScroll) { rafId = null; return; }
          if (startTs === null) startTs = ts;
          var elapsed = ts - startTs;
          var px = (elapsed - READ_PAD_MS) * (AUTOSCROLL_PX_PER_S / 1000);   // 前段停在頂端讀開頭
          msgs.forEach(function (m) {
            var max = m.scrollHeight - m.clientHeight;
            m.scrollTop = Math.max(0, Math.min(max, px));
          });
          rafId = (elapsed < dwell) ? requestAnimationFrame(frame) : null;
        }
        rafId = requestAnimationFrame(frame);
      }
      function clearAutoScroll() { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
      // 排下一批：多批→換下批；單批但有長祝福→重捲同批（讓它循環讀完）；單批又不溢出→靜止不排程
      function scheduleNext(dwell) {
        if (rotateTimer) { clearTimeout(rotateTimer); rotateTimer = null; }
        var multi = getFiltered().length > batchSize();
        var overflow = !!stage.querySelector(".wcard.can-scroll");
        if (!multi && !overflow) return;
        rotateTimer = setTimeout(function () { if (multi) batch++; renderBatch(); }, dwell);
      }

      // 新祝福即時通知 toast（背景輪詢偵測到審核通過的新祝福時淡入，12 秒自動收起）
      var newWishToast = document.getElementById("newWishToast");
      var newWishTimer = null;
      function showNewWishToast(n) {
        if (!newWishToast) return;
        var nEl = newWishToast.querySelector(".newwish-toast__n");
        if (nEl) nEl.textContent = n;
        newWishToast.hidden = false;
        requestAnimationFrame(function () { newWishToast.classList.add("show"); });
        clearTimeout(newWishTimer);
        newWishTimer = setTimeout(hideNewWishToast, 12000);
      }
      function hideNewWishToast() {
        if (!newWishToast) return;
        newWishToast.classList.remove("show");
        clearTimeout(newWishTimer);
        newWishTimer = setTimeout(function () { newWishToast.hidden = true; }, 450);
      }

      function load() {
        fetch(ENDPOINT + "?action=wishes&t=" + Date.now())
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var ws = (d && d.wishes) || [];
            // 準即時通知：最新列號 maxR 變大 = LINE 審核通過的新祝福進來（首次載入只設基準、不提示）
            var maxR = ws.reduce(function (m, w) { return Math.max(m, w.r || 0); }, 0);
            var firstLoad = (lastSeenMaxR === null);
            var newCount = firstLoad ? 0 : ws.filter(function (w) { return (w.r || 0) > lastSeenMaxR; }).length;
            lastSeenMaxR = maxR;
            wishes = ws;
            countEl.textContent = ws.length;
            statusEl.textContent = ws.length ? "祝福持續更新中" : "等待第一則祝福";
            buildStageFilters();
            // 首次載入或有新祝福才重置輪播（把最新祝福捲到最前）；無新祝福只靜默更新資料，不打斷正在進行的輪播
            if (firstLoad || newCount > 0) { batch = 0; renderBatch(); }
            if (newCount > 0) showNewWishToast(newCount);
          })
          .catch(function () { /* 靜默，保留上一批畫面 */ });
      }

      // 星點
      (function () {
        var box = document.getElementById("stars");
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 90; i++) {
          var s = document.createElement("span");
          s.className = "star";
          var sz = (1.3 + Math.random() * 2.4).toFixed(1);
          s.style.left = (Math.random() * 100).toFixed(1) + "vw";
          s.style.top = (Math.random() * 72).toFixed(1) + "vh";
          s.style.width = sz + "px"; s.style.height = sz + "px";
          s.style.setProperty("--tw", (2.6 + Math.random() * 3.6).toFixed(1) + "s");
          s.style.setProperty("--o0", (0.12 + Math.random() * 0.25).toFixed(2));
          s.style.setProperty("--o1", (0.6 + Math.random() * 0.4).toFixed(2));
          s.style.animationDelay = (-Math.random() * 5).toFixed(1) + "s";
          frag.appendChild(s);
        }
        box.appendChild(frag);
      })();

      // 流星（偶爾劃過）
      (function () {
        if (reduce) return;
        var box = document.getElementById("shooting");
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 4; i++) {
          var s = document.createElement("span");
          s.className = "shoot";
          s.style.left = (52 + Math.random() * 44).toFixed(1) + "vw";
          s.style.top = (2 + Math.random() * 38).toFixed(1) + "vh";
          s.style.setProperty("--sdur", (9 + Math.random() * 7).toFixed(1) + "s");
          s.style.setProperty("--sdelay", (-Math.random() * 16).toFixed(1) + "s");
          frag.appendChild(s);
        }
        box.appendChild(frag);
      })();

      // 紙花
      (function () {
        if (reduce) return;
        var box = document.getElementById("confetti");
        var colors = ["#ff5e6c", "#ff9f43", "#ffd23f", "#2ecc71", "#45aaf2", "#7d5fff", "#f5c451"];
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 34; i++) {
          var s = document.createElement("span");
          s.style.left = Math.random() * 100 + "vw";
          s.style.background = colors[i % colors.length];
          s.style.animationDuration = (7 + Math.random() * 6) + "s";
          s.style.animationDelay = (-Math.random() * 9) + "s";
          s.style.opacity = (0.5 + Math.random() * 0.45).toFixed(2);
          s.style.transform = "rotate(" + (Math.random() * 360).toFixed(0) + "deg)";
          frag.appendChild(s);
        }
        box.appendChild(frag);
      })();

      stage.addEventListener("click", function (e) {
        var btn = e.target.closest ? e.target.closest(".wlike") : null;
        if (!btn || btn.disabled) return;
        var r = parseInt(btn.getAttribute("data-row"), 10);
        if (!r || hasLiked(r)) return;
        markLiked(r);
        btn.classList.add("is-liked"); btn.disabled = true;
        var nEl = btn.querySelector(".wlike__n");
        var cur = (parseInt(nEl.textContent, 10) || 0) + 1;
        nEl.textContent = cur;
        bumpNumber(nEl); flyHearts(btn);
        for (var i = 0; i < wishes.length; i++) if (wishes[i].r === r) { wishes[i].l = cur; break; }
        fetch(ENDPOINT + "?action=like&row=" + r + "&t=" + Date.now())
          .then(function (res) { return res.json(); })
          .then(function (d) {
            if (d && d.ok && typeof d.likes === "number") {
              nEl.textContent = d.likes;
              for (var j = 0; j < wishes.length; j++) if (wishes[j].r === r) { wishes[j].l = d.likes; break; }
            }
          })
          .catch(function () { /* 樂觀更新已生效，靜默 */ });
      });

      // 捲動到底就拿掉底部漸層遮罩 / 箭頭（scroll 不冒泡，用 capture 抓子元素的捲動；含程式自動捲與手動捲）
      stage.addEventListener("scroll", function (e) {
        var m = e.target;
        if (!m || !m.classList || !m.classList.contains("wcard__msg")) return;
        var card = m.closest ? m.closest(".wcard") : null;
        if (card) card.classList.toggle("at-bottom", m.scrollTop + m.clientHeight >= m.scrollHeight - 4);
      }, true);

      // 使用者用滑鼠滾輪 / 手指滑動長祝福時：停掉自動捲與輪播，閒置 MANUAL_IDLE_MS 後再恢復（避免讀到一半被換走）
      function onUserScrollIntent(e) {
        var t = e.target;
        var m = (t && t.closest) ? t.closest(".wcard__msg") : null;
        if (!m || m.scrollHeight - m.clientHeight <= 4) return;   // 不在可捲動的長祝福上 → 不打斷輪播
        manualScroll = true;
        clearAutoScroll();
        if (rotateTimer) { clearTimeout(rotateTimer); rotateTimer = null; }
        clearTimeout(idleTimer);
        idleTimer = setTimeout(function () { manualScroll = false; if (multiBatchNow()) { batch++; } renderBatch(); }, MANUAL_IDLE_MS);
      }
      function multiBatchNow() { return getFiltered().length > batchSize(); }
      stage.addEventListener("wheel", onUserScrollIntent, { passive: true });
      stage.addEventListener("touchstart", onUserScrollIntent, { passive: true });
      stage.addEventListener("touchmove", onUserScrollIntent, { passive: true });

      var fsbtn = document.getElementById("fsbtn");
      function goFs() {
        var el = document.documentElement;
        if (document.fullscreenElement) return;
        (el.requestFullscreen || el.webkitRequestFullscreen || function () {}).call(el);
      }
      fsbtn.addEventListener("click", goFs);
      document.body.addEventListener("dblclick", goFs);

      // 背景音樂：畢業歌〈風箏〉。瀏覽器 autoplay 政策需使用者點一下才播；漸入漸出更柔和。
      // 跨分頁互斥：按下開啟畢業歌時廣播 "playing" → 主頁校歌卡拉OK版自動暫停，避免兩種音軌同時播。
      var bgm = document.getElementById("bgm");
      var bgmBtn = document.getElementById("bgmBtn");
      var bgmChannel = ("BroadcastChannel" in window) ? new BroadcastChannel("smes-grad-bgm") : null;
      if (bgm && bgmBtn) {
        var bgmFade = null;
        function fadeTo(target, ms) {
          if (bgmFade) clearInterval(bgmFade);
          var steps = Math.max(1, Math.round(ms / 50)), i = 0, from = bgm.volume;
          bgmFade = setInterval(function () {
            i++;
            bgm.volume = Math.min(1, Math.max(0, from + (target - from) * i / steps));
            if (i >= steps) { clearInterval(bgmFade); bgmFade = null; if (target === 0) bgm.pause(); }
          }, 50);
        }
        function startBgm() {
          bgm.volume = 0;
          bgm.play().then(function () { fadeTo(0.55, 1600); }).catch(function () {});
          bgmBtn.classList.add("is-playing"); bgmBtn.innerHTML = "🔊 畢業歌";
          if (bgmChannel) bgmChannel.postMessage("playing");   // 通知主頁校歌暫停
        }
        function stopBgm() {
          bgmBtn.classList.remove("is-playing"); bgmBtn.innerHTML = "🔇 畢業歌";
          if (!bgm.paused) fadeTo(0, 600);
        }
        bgmBtn.addEventListener("click", function () {
          if (bgm.paused) startBgm(); else stopBgm();
        });
        // 其他分頁（主頁校歌）開始播 → 本頁畢業歌暫停，避免雙軌
        if (bgmChannel) bgmChannel.onmessage = function (e) { if (e.data === "playing") stopBgm(); };
      }

      // 掃碼留祝福：可關閉收合成迷你鈕、點 QR 放大方便掃描
      var qrWish = document.getElementById("qrWish");
      var qrMini = document.getElementById("qrMini");
      var qrModal = document.getElementById("qrModal");
      if (qrWish && qrMini) {
        var qrClose = document.getElementById("qrClose");
        var qrZoom = document.getElementById("qrZoom");
        if (qrClose) qrClose.addEventListener("click", function () { qrWish.hidden = true; qrMini.hidden = false; });
        qrMini.addEventListener("click", function () { qrMini.hidden = true; qrWish.hidden = false; });
        if (qrZoom && qrModal) {
          var qrModalClose = document.getElementById("qrModalClose");
          qrZoom.addEventListener("click", function () { qrModal.hidden = false; });
          if (qrModalClose) qrModalClose.addEventListener("click", function () { qrModal.hidden = true; });
          qrModal.addEventListener("click", function (e) { if (e.target === qrModal) qrModal.hidden = true; });
          document.addEventListener("keydown", function (e) { if (e.key === "Escape" && !qrModal.hidden) qrModal.hidden = true; });
        }
      }

      var wakeLock = null;
      async function keepAwake() {
        try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
      }
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "visible") { keepAwake(); load(); } // 切回分頁立即檢查有無新祝福
      });
      keepAwake();

      load();
      setInterval(load, RELOAD_MS);
      window.addEventListener("focus", load);
      var rzTimer = null;
      window.addEventListener("resize", function () { clearTimeout(rzTimer); rzTimer = setTimeout(function () { batch = 0; renderBatch(); }, 250); });
    })();
  </script>
</body>
</html>
