<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>第103屆畢業祝福牆 · 現場投影</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --navy-900:#141d3b; --navy-800:#1d2a52; --navy-700:#283a72;
      --gold:#f5b942; --coral:#ff7a6b;
      --font-sans:"Noto Sans TC",system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;
      --font-serif:"Noto Serif TC","Noto Sans TC",serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:var(--font-sans); color:#fff; background:var(--navy-900);
      overflow:hidden; position:relative;
      display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }
    /* 背景：夜空漸層 + 彩虹光弧 + 紙花 */
    .sky{position:fixed;inset:0;z-index:-3;
      background:radial-gradient(120% 90% at 50% -10%, #3a4f9e 0%, #233268 38%, #16204a 72%, #101733 100%);}
    .rainbow{position:fixed;left:50%;bottom:-60%;transform:translateX(-50%);
      width:160%;aspect-ratio:1/1;max-width:1600px;z-index:-2;border-radius:50%;
      background:radial-gradient(closest-side,
        transparent 60%, rgba(125,95,255,.16) 64%, rgba(69,170,242,.16) 70%,
        rgba(46,204,113,.16) 76%, rgba(255,210,63,.18) 82%, rgba(255,159,67,.16) 88%, rgba(255,94,108,.16) 94%, transparent 98%);}
    .confetti{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
    .confetti span{position:absolute;top:-16px;width:10px;height:15px;border-radius:2px;opacity:.85;animation:fall linear infinite;}
    @keyframes fall{to{transform:translateY(110vh) rotate(540deg);}}

    /* 頁首 */
    .head{display:flex;align-items:center;gap:clamp(14px,2vw,26px);
      padding:clamp(18px,3vh,34px) clamp(24px,4vw,60px);}
    .head__logo{width:clamp(56px,7vw,92px);height:auto;filter:drop-shadow(0 4px 14px rgba(0,0,0,.4));}
    .head__titles{flex:1;min-width:0;}
    .head__titles h1{font-family:var(--font-serif);font-weight:900;
      font-size:clamp(1.6rem,3.4vw,3rem);line-height:1.15;
      background:linear-gradient(90deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;}
    .head__titles p{color:rgba(255,255,255,.78);font-size:clamp(.85rem,1.4vw,1.15rem);margin-top:4px;letter-spacing:1px;}
    .head__count{flex-shrink:0;text-align:center;
      background:rgba(245,185,66,.14);border:1px solid rgba(245,185,66,.4);border-radius:18px;
      padding:clamp(8px,1.4vh,14px) clamp(14px,1.8vw,24px);}
    .head__count b{display:block;font-size:clamp(1.6rem,3.2vw,2.8rem);font-weight:900;color:var(--gold);line-height:1;}
    .head__count span{font-size:clamp(.7rem,1.1vw,.95rem);color:rgba(255,255,255,.8);}

    /* 舞台：祝福大卡輪播 */
    .stage{flex:1;display:grid;gap:clamp(16px,2vw,30px);align-content:center;
      grid-template-columns:repeat(3,1fr);
      padding:clamp(8px,1.5vh,20px) clamp(24px,4vw,60px) clamp(12px,2vh,24px);
      transition:opacity .7s ease;}
    .stage.fading{opacity:0;}
    @media (max-width:1100px){.stage{grid-template-columns:repeat(2,1fr);}}
    @media (max-width:680px){.stage{grid-template-columns:1fr;}}

    .wcard{background:rgba(255,255,255,.07);border:1px solid rgba(245,185,66,.28);
      border-radius:22px;padding:clamp(22px,2.6vw,40px);
      box-shadow:0 20px 50px rgba(0,0,0,.3);
      display:flex;flex-direction:column;gap:14px;min-height:0;
      animation:rise .7s cubic-bezier(.22,1,.36,1) both;}
    .wcard__to{color:var(--gold);font-weight:900;font-size:clamp(1.05rem,1.7vw,1.5rem);
      display:flex;align-items:center;gap:8px;}
    .wcard__msg{color:#fff;font-size:clamp(1.15rem,2vw,1.9rem);line-height:1.7;font-weight:500;
      overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:7;}
    .wcard:nth-child(2){animation-delay:.12s;}
    .wcard:nth-child(3){animation-delay:.24s;}
    @keyframes rise{from{opacity:0;transform:translateY(26px) scale(.98);}to{opacity:1;transform:none;}}

    .empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;
      font-size:clamp(1.2rem,2.4vw,2rem);color:rgba(255,255,255,.7);padding:40px;}

    /* 頁尾 */
    .foot{display:flex;align-items:center;justify-content:space-between;gap:16px;
      padding:clamp(10px,1.6vh,18px) clamp(24px,4vw,60px);
      font-size:clamp(.75rem,1.2vw,1rem);color:rgba(255,255,255,.62);}
    .foot__live{display:inline-flex;align-items:center;gap:7px;}
    .foot__live::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--coral);
      box-shadow:0 0 0 0 rgba(255,122,107,.6);animation:pulse 1.8s infinite;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,122,107,.55);}70%{box-shadow:0 0 0 12px rgba(255,122,107,0);}100%{box-shadow:0 0 0 0 rgba(255,122,107,0);}}

    /* 全螢幕鈕 */
    .fsbtn{position:fixed;top:14px;right:16px;z-index:5;
      background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.28);
      border-radius:999px;padding:9px 16px;font-size:.9rem;font-weight:700;cursor:pointer;
      font-family:inherit;transition:background .2s;}
    .fsbtn:hover{background:rgba(255,255,255,.26);}
    :fullscreen .fsbtn{display:none;}

    @media (prefers-reduced-motion:reduce){
      .confetti span{animation:none;display:none;}
      .wcard{animation:none;}
      .stage{transition:none;}
    }
  </style>
</head>
<body>
  <div class="sky"></div>
  <div class="rainbow"></div>
  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <header class="head">
    <img class="head__logo" src="assets/logo.png" alt="石門國小校徽" />
    <div class="head__titles">
      <h1>第103屆 畢業祝福牆</h1>
      <p>桃園市龍潭區石門國民小學 · 115.6.10 畢業典禮</p>
    </div>
    <div class="head__count"><b id="count">—</b><span>則祝福</span></div>
  </header>

  <main class="stage" id="stage">
    <div class="empty" id="empty">祝福載入中…</div>
  </main>

  <footer class="foot">
    <span class="foot__live" id="status">祝福持續更新中</span>
    <span>💛 來自家長與親友的暖心祝福，陪伴畢業生勇敢啟程</span>
  </footer>

  <button class="fsbtn" id="fsbtn" type="button">⛶ 全螢幕</button>

  <script>
    (function () {
      // ⬇️ 與 script.js 相同的 GAS Web App /exec（祝福資料來源）。換端點時兩處都要改。
      var ENDPOINT = "https://script.google.com/macros/s/AKfycbyQ49Y_tAxh4dBmyK0Rwcb-apR1tShdNpLTPRCKClbyVGQtSX9-atoNDzvCNiucx2NX/exec";
      var BATCH = 3;          // 一次顯示幾則
      var ROTATE_MS = 9000;   // 每批停留秒數
      var RELOAD_MS = 90000;  // 多久重新抓一次資料（典禮中新審核祝福會進來）
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      var stage = document.getElementById("stage");
      var countEl = document.getElementById("count");
      var statusEl = document.getElementById("status");
      var wishes = [], batch = 0, rotateTimer = null;

      function maskName(n) {
        n = String(n || "").trim();
        if (n.length <= 2) return n;
        return n.charAt(0) + new Array(n.length - 1).join("○") + n.charAt(n.length - 1);
      }
      function esc(s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }

      function renderBatch() {
        if (!wishes.length) {
          stage.innerHTML = '<div class="empty">祝福即將開始收集，敬請期待 💛</div>';
          return;
        }
        var total = wishes.length;
        var start = (batch * BATCH) % total;
        var slice = [];
        for (var i = 0; i < Math.min(BATCH, total); i++) slice.push(wishes[(start + i) % total]);
        var html = slice.map(function (w) {
          return '<div class="wcard"><div class="wcard__to">💛 給 ' +
            esc(w.c) + " " + esc(maskName(w.n)) + '</div><div class="wcard__msg">' +
            esc(w.m) + "</div></div>";
        }).join("");
        if (reduce) { stage.innerHTML = html; return; }
        stage.classList.add("fading");
        setTimeout(function () { stage.innerHTML = html; stage.classList.remove("fading"); }, 700);
      }

      function startRotate() {
        if (rotateTimer) clearInterval(rotateTimer);
        if (wishes.length <= BATCH) return; // 不足一批不輪播
        rotateTimer = setInterval(function () { batch++; renderBatch(); }, ROTATE_MS);
      }

      function load() {
        fetch(ENDPOINT + "?action=wishes&t=" + Date.now())
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var ws = (d && d.wishes) || [];
            wishes = ws;
            countEl.textContent = ws.length;
            statusEl.textContent = ws.length ? "祝福持續更新中" : "等待第一則祝福";
            batch = 0; renderBatch(); startRotate();
          })
          .catch(function () { /* 靜默，保留上一批畫面 */ });
      }

      // 紙花
      (function () {
        if (reduce) return;
        var box = document.getElementById("confetti");
        var colors = ["#ff5e6c", "#ff9f43", "#ffd23f", "#2ecc71", "#45aaf2", "#7d5fff", "#f5b942"];
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 36; i++) {
          var s = document.createElement("span");
          s.style.left = Math.random() * 100 + "vw";
          s.style.background = colors[i % colors.length];
          s.style.animationDuration = (6 + Math.random() * 6) + "s";
          s.style.animationDelay = (-Math.random() * 8) + "s";
          s.style.opacity = (0.5 + Math.random() * 0.45).toFixed(2);
          frag.appendChild(s);
        }
        box.appendChild(frag);
      })();

      // 全螢幕（瀏覽器需使用者手勢）
      var fsbtn = document.getElementById("fsbtn");
      function goFs() {
        var el = document.documentElement;
        if (document.fullscreenElement) return;
        (el.requestFullscreen || el.webkitRequestFullscreen || function () {}).call(el);
      }
      fsbtn.addEventListener("click", goFs);
      document.body.addEventListener("dblclick", goFs);

      // 防螢幕休眠（盡力而為）
      var wakeLock = null;
      async function keepAwake() {
        try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
      }
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "visible") keepAwake();
      });
      keepAwake();

      load();
      setInterval(load, RELOAD_MS);
    })();
  </script>
</body>
</html>
